# TEMPLATE — DO NOT APPLY WITHOUT REVIEW
# =============================================================================
# Nginx upstream block template for Wheeler ecosystem 3-server cutover.
# This file defines upstream groups for revenue-critical backends.
#
# INTENDED USE: Copy relevant blocks into your active Nginx configuration
# AFTER replacing all template variables ({{VAR}}) with real values and
# testing in a staging or maintenance-window context.
# =============================================================================

# ---------------------------------------------------------------------------
# SHARED SETTINGS (apply to all upstream blocks unless overridden)
# ---------------------------------------------------------------------------

# NOTES:
# - least_conn: distributes requests to the backend with the fewest active
#   connections. Prefer this over round-robin when backends are heterogeneous
#   (e.g. different hardware, different container limits).
# - max_fails + fail_timeout: within fail_timeout seconds, if max_fails
#   consecutive health checks fail the server is marked DOWN.
# - Weight: optional; defaults to 1. Use higher weights for beefier nodes.

# ---------------------------------------------------------------------------
# Upstream: fundsrecoverygroup.com
# Revenue service — static site + API served from AIOPS (Node.js / PM2)
# ---------------------------------------------------------------------------
upstream fundsrecoverygroup_backend {
    least_conn;

    # Primary backend — AIOPS Node (via Tailscale)
    server {{AIOPS_TAILSCALE_IP}}:{{PORT_FRG}} max_fails=3 fail_timeout=30s weight=10;

    # Fallback / canary — local Hostinger instance (uncomment when dual-stack)
    # server {{EDGE_LOCALHOST}}:{{PORT_FRG_LOCAL}} max_fails=3 fail_timeout=30s weight=1 backup;

    # Health: interval between passive failure probes; rise/fall counts for active
    # checks (requires health_check directive in server block)
    # health_check interval=10s fails=3 passes=2;

    # Keepalive pool — reduce TLS handshake overhead per-request
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Upstream: predictionradar.app
# Revenue service — Python/FastAPI on AIOPS
# ---------------------------------------------------------------------------
upstream predictionradar_app_backend {
    least_conn;

    server {{AIOPS_TAILSCALE_IP}}:{{PORT_PRADAR}} max_fails=3 fail_timeout=30s weight=10;

    # health_check interval=10s fails=3 passes=2;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Upstream: surplusai.io
# Revenue service — AI inference backend on AIOPS
# ---------------------------------------------------------------------------
upstream surplusai_io_backend {
    least_conn;

    server {{AIOPS_TAILSCALE_IP}}:{{PORT_SURPLUSAI}} max_fails=3 fail_timeout=30s weight=10;

    # health_check interval=10s fails=3 passes=2;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Upstream: frgops.fundsrecoverygroup.tech
# Revenue service — internal ops dashboard, local to EDGE
# ---------------------------------------------------------------------------
upstream frgops_tech_backend {
    least_conn;

    # Served directly on EDGE node (Hostinger)
    server {{EDGE_LOCALHOST}}:{{PORT_FRGOPS}} max_fails=3 fail_timeout=30s;

    # health_check interval=10s fails=3 passes=2;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# Upstream: radar.fundsrecoverygroup.tech
# Revenue service — radar subdomain, AIOPS
# ---------------------------------------------------------------------------
upstream radar_frg_tech_backend {
    least_conn;

    server {{AIOPS_TAILSCALE_IP}}:{{PORT_RADAR_FRG}} max_fails=3 fail_timeout=30s weight=10;

    # health_check interval=10s fails=3 passes=2;
    keepalive 32;
}

# ---------------------------------------------------------------------------
# Upstream: wheeler.frgop.io
# Revenue service — main Wheeler app, AIOPS
# ---------------------------------------------------------------------------
upstream wheeler_frgop_io_backend {
    least_conn;

    server {{AIOPS_TAILSCALE_IP}}:{{PORT_WHEELER}} max_fails=3 fail_timeout=30s weight=10;

    # health_check interval=10s fails=3 passes=2;
    keepalive 32;
}

