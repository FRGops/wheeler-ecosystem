# =============================================================================
# Prometheus Configuration — Wheeler AIOps Stack
# =============================================================================
# Deployed on: Hetzner CPX51 (primary)
# Scrapes:     Hetzner CPX51 + Hostinger VPS (via Tailscale mesh)
# Integrates:  Alertmanager, Grafana, Netdata
# =============================================================================

global:
  scrape_interval: 15s       # Every 15s — balanced for 2-server setup
  evaluation_interval: 15s   # Evaluate rules every 15s
  scrape_timeout: 10s        # Timeout per scrape

  # External labels for cross-system correlation
  external_labels:
    cluster: 'wheeler-aiops'
    region: 'hetzner-fsn1'

# =============================================================================
# ALERTMANAGER — Central alert routing
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - 'localhost:9093'  # AlertManager on Hetzner
      scheme: http
      timeout: 10s
      api_version: v2

# =============================================================================
# RULE FILES — All alerting and recording rules
# =============================================================================
rule_files:
  - 'alert-rules.yml'

# =============================================================================
# SCRAPE CONFIGURATIONS
# =============================================================================
scrape_configs:

  # ---------------------------------------------------------------------------
  # 1. PROMETHEUS SELF — Monitor the monitor
  # ---------------------------------------------------------------------------
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'hetzner-prometheus'

  # ---------------------------------------------------------------------------
  # 2. NODE EXPORTER — System metrics (CPU, RAM, Disk, Network)
  # ---------------------------------------------------------------------------
  # WHY: Host-level metrics for capacity planning and anomaly detection
  - job_name: 'node'
    scrape_interval: 15s
    static_configs:
      # Hetzner CPX51 (16 vCPU, 32GB RAM) — primary host
      - targets: ['100.121.230.28:9100']
        labels:
          server: 'hetzner'
          role: 'primary'
      # Hostinger VPS (4-8 vCPU, 8-16GB RAM) — edge host
      - targets: ['100.98.163.17:9100']
        labels:
          server: 'hostinger'
          role: 'edge'
    relabel_configs:
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: 'tailscale_ip'
        replacement: '$1'

  # ---------------------------------------------------------------------------
  # 3. CADVISOR — Container-level metrics (CPU, RAM, Network per container)
  # ---------------------------------------------------------------------------
  # WHY: Container resource usage, OOM detection, throttling alerts
  - job_name: 'cadvisor'
    scrape_interval: 15s
    static_configs:
      - targets: ['100.121.230.28:8080']
        labels:
          server: 'hetzner'
      - targets: ['100.98.163.17:8080']
        labels:
          server: 'hostinger'

  # ---------------------------------------------------------------------------
  # 4. POSTGRES EXPORTER — Database metrics
  # ---------------------------------------------------------------------------
  # WHY: Track connections, query latency, replication lag, dead tuples
  - job_name: 'postgres'
    scrape_interval: 30s  # DB metrics change slower than CPU
    static_configs:
      # Hetzner: AIOps Postgres (port 5432)
      - targets: ['100.121.230.28:9187']
        labels:
          server: 'hetzner'
          db_name: 'aiops'
          db_port: '5432'
      # Hetzner: Prediction Radar Postgres (port 5433)
      - targets: ['100.121.230.28:9188']
        labels:
          server: 'hetzner'
          db_name: 'prediction_radar'
          db_port: '5433'
      # Hetzner: RavynAI Postgres (port 5434)
      - targets: ['100.121.230.28:9189']
        labels:
          server: 'hetzner'
          db_name: 'ravynai'
          db_port: '5434'
      # Hostinger: FRGops Postgres (port 5432)
      - targets: ['100.98.163.17:9187']
        labels:
          server: 'hostinger'
          db_name: 'frgops'
          db_port: '5432'

  # ---------------------------------------------------------------------------
  # 5. REDIS EXPORTER — Cache/queue metrics
  # ---------------------------------------------------------------------------
  # WHY: Track cache hit ratio, queue depth, memory usage, evictions
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      # Hetzner: AIOps Redis (port 6379)
      - targets: ['100.121.230.28:9121']
        labels:
          server: 'hetzner'
          redis_name: 'aiops'
          redis_port: '6379'
      # Hetzner: Prediction Radar Redis (port 6380)
      - targets: ['100.121.230.28:9122']
        labels:
          server: 'hetzner'
          redis_name: 'prediction_radar'
          redis_port: '6380'
      # Hostinger: FRGops Redis (port 6379)
      - targets: ['100.98.163.17:9121']
        labels:
          server: 'hostinger'
          redis_name: 'frgops'
          redis_port: '6379'

  # ---------------------------------------------------------------------------
  # 6. TRAEFIK — Reverse proxy metrics
  # ---------------------------------------------------------------------------
  # WHY: Track request rates, latency, error rates across all routes
  - job_name: 'traefik'
    scrape_interval: 15s
    static_configs:
      # Hetzner: Internal Traefik router
      - targets: ['100.121.230.28:8082']
        labels:
          server: 'hetzner'
          traefik_role: 'internal'
      # Hostinger: Public edge Traefik
      - targets: ['100.98.163.17:8082']
        labels:
          server: 'hostinger'
          traefik_role: 'edge'

  # ---------------------------------------------------------------------------
  # 7. NETDATA — Supplementary realtime metrics (via Prometheus API)
  # ---------------------------------------------------------------------------
  # Netdata exposes a Prometheus endpoint at /api/v1/all
  # WHY: Netdata has richer per-second metrics for high-res dashboards
  - job_name: 'netdata'
    scrape_interval: 30s
    metrics_path: '/api/v1/all'
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['100.121.230.28:19999']
        labels:
          server: 'hetzner'

  # ---------------------------------------------------------------------------
  # 8. DOCKER ENGINE — Docker daemon metrics (if enabled)
  # ---------------------------------------------------------------------------
  - job_name: 'docker'
    scrape_interval: 30s
    static_configs:
      - targets: ['100.121.230.28:9323']
        labels:
          server: 'hetzner'
      - targets: ['100.98.163.17:9323']
        labels:
          server: 'hostinger'

  # ---------------------------------------------------------------------------
  # 9. BLACKBOX EXPORTER — Synthetic checks (external probes)
  # ---------------------------------------------------------------------------
  # WHY: Verify public endpoints are reachable and SSL is valid
  # NOTE: Deploy blackbox_exporter on Hostinger for external perspective
  - job_name: 'blackbox-http'
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        # Public endpoints via Hostinger Traefik
        - 'https://predictionradar.wheeler.ai'
        - 'https://ravynai.wheeler.ai'
        - 'https://superset.wheeler.ai'
        - 'https://healthchecks.wheeler.ai'
        - 'https://changedetect.wheeler.ai'
        - 'https://grafana.wheeler.ai'
        - 'https://uptime.wheeler.ai'
        - 'https://frgops.wheeler.ai'
        - 'https://chatwoot.wheeler.ai'
        - 'https://n8n.wheeler.ai'
        - 'https://docuseal.wheeler.ai'
        - 'https://litellm.wheeler.ai'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: '100.98.163.17:9115'  # blackbox_exporter on Hostinger
    metric_relabel_configs:
      - source_labels: [probe_ssl_earliest_cert_expiry]
        target_label: ssl_expiry_days
        replacement: '$1'

  # ---------------------------------------------------------------------------
  # 10. TCP BLACKBOX — Port reachability checks
  # ---------------------------------------------------------------------------
  - job_name: 'blackbox-tcp'
    scrape_interval: 60s
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
        # Hetzner internal services
        - '100.121.230.28:5432'   # AIOps Postgres
        - '100.121.230.28:5433'   # Prediction Radar DB
        - '100.121.230.28:5434'   # RavynAI DB
        - '100.121.230.28:6379'   # AIOps Redis
        - '100.121.230.28:6380'   # Prediction Radar Redis
        - '100.121.230.28:4222'   # NATS
        - '100.121.230.28:9090'   # Prometheus
        - '100.121.230.28:9093'   # AlertManager
        - '100.121.230.28:3002'   # Grafana
        # Hostinger internal services
        - '100.98.163.17:5432'     # FRGops Postgres
        - '100.98.163.17:6379'     # FRGops Redis
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: '100.121.230.28:9115'  # blackbox_exporter on Hetzner

  # ---------------------------------------------------------------------------
  # 11. UPTIME KUMA — Pull synthetic check results
  # ---------------------------------------------------------------------------
  - job_name: 'uptime-kuma'
    scrape_interval: 30s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['100.121.230.28:3001']
        labels:
          server: 'hetzner'

