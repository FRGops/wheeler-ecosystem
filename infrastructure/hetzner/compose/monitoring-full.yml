# =============================================================================
# Enhanced Monitoring Stack — Full Observability Platform
# =============================================================================
# Comprehensive monitoring for the CPX51 server with:
#   - Uptime Kuma: Synthetic monitoring + status page
#   - Prometheus: Metrics collection and alerting
#   - Grafana: Dashboards and visualization
#   - Node Exporter: Host-level metrics (CPU, RAM, Disk, Network)
#   - cAdvisor: Container-level metrics
#   - Postgres Exporter: Database performance metrics
#   - Redis Exporter: Cache/queue performance metrics
#   - AlertManager: Alert routing and notification
#
# WHY these tools:
#   - Prometheus + Grafana is the industry-standard stack
#   - Node Exporter is the standard host agent (lightweight, no dependencies)
#   - cAdvisor provides container-level insights without sidecars
#   - Postgres/Redis exporters are DB-specific, lightweight
#   - Uptime Kuma is simpler than Grafana for synthetic checks
#   - AlertManager handles dedup + routing for all alert sources
#
# Data retention:
#   - Prometheus: 15 days local storage (configurable via --storage.tsdb.retention.time)
#   - Grafana: SQLite database (dashboards config), no metric storage
#   - Postgres/Redis metrics: kept for alerting only (avg over time)
#
# Alert flow:
#   Node Exporter → Prometheus → AlertManager → Slack/Email/PagerDuty
#   cAdvisor      → Prometheus → AlertManager → Slack/Email/PagerDuty
#   Postgres Exp  → Prometheus → AlertManager → Slack/Email/PagerDuty
#   Uptime Kuma   → Webhook    → AlertManager → Slack/Email/PagerDuty
#
# Network: All services on monitoring network.
#   Grafana and Uptime Kuma attach to traefik-public for web UI.
#   Prometheus, exporters are internal-only (Tailscale for admin).
# =============================================================================

services:
  # ===========================================================================
  # UPTIME KUMA — Synthetic monitoring + status page
  # ===========================================================================
  # Monitors all services from an external perspective. Replaces expensive
  # alternatives (Pingdom, Better Uptime) with a self-hosted solution.
  #
  # Configure monitors via the web UI after deployment:
  #   https://uptime.wheeler.ai
  #
  # Recommended monitors:
  #   - HTTP: All public endpoints every 60s
  #   - TCP: All internal services (via Docker DNS) every 120s
  #   - SSL: Certificate expiry (30-day warning) every 24h
  #   - Ping: Server reachability every 60s
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    volumes:
      - uptime-kuma-data:/app/data

    healthcheck:
      test: ["CMD", "node", "server/server.js", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - monitoring
      - traefik-public

    labels:
      - "traefik.enable=true"

      # Uptime Kuma Web UI
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.wheeler.ai`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls=true"
      - "traefik.http.routers.uptime-kuma.tls.certresolver=letsencrypt-staging"
      - "traefik.http.routers.uptime-kuma.middlewares=chain-public@file"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

  # ===========================================================================
  # PROMETHEUS — Metrics collection and storage
  # ===========================================================================
  # Scrapes metrics from all exporters and services at configurable intervals.
  # Stores time-series data for querying and alerting.
  #
  # Configuration: prometheus.yml is generated at startup with defaults.
  # For custom config, mount a file: ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  prometheus:
    image: prom/prometheus:v2.55
    container_name: prometheus
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"  # Enable /-/reload for config changes
      - "--web.enable-admin-api"  # Enable admin operations (snapshot, delete)

    volumes:
      - prometheus-data:/prometheus
      # Uncomment for custom config:
      # - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - monitoring

    ports:
      - "127.0.0.1:9090:9090"  # Admin access via Tailscale

  # ===========================================================================
  # GRAFANA — Dashboards and visualization
  # ===========================================================================
  # Provides beautiful dashboards for all metrics. Pre-configured with
  # Prometheus as a data source.
  #
  # Provisioning:
  #   - Data sources: /etc/grafana/provisioning/datasources/
  #   - Dashboards: /etc/grafana/provisioning/dashboards/
  #   - Alert channels: /etc/grafana/provisioning/notifiers/
  #
  # See: https://grafana.com/docs/grafana/latest/administration/provisioning/
  grafana:
    image: grafana/grafana:11.3
    container_name: grafana
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Must set GRAFANA_ADMIN_PASSWORD}"
      GF_INSTALL_PLUGINS: "${GRAFANA_PLUGINS:-grafana-piechart-panel,grafana-worldmap-panel}"
      GF_SERVER_ROOT_URL: "https://grafana.wheeler.ai"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_MODE: "console"
      GF_LOG_LEVEL: "${LOG_LEVEL:-info}"
      TZ: "${TZ:-UTC}"

    volumes:
      - grafana-data:/var/lib/grafana
      # Uncomment for provisioning:
      # - ./grafana/provisioning:/etc/grafana/provisioning:ro

    depends_on:
      prometheus:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - monitoring
      - traefik-public

    labels:
      - "traefik.enable=true"

      # Grafana Web UI
      - "traefik.http.routers.grafana.rule=Host(`grafana.wheeler.ai`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt-staging"
      - "traefik.http.routers.grafana.middlewares=chain-public@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3002"

  # ===========================================================================
  # NODE EXPORTER — Host-level metrics
  # ===========================================================================
  # Exposes standard host metrics for Prometheus:
  #   - CPU usage per core
  #   - Memory usage (total, used, cached, buffers)
  #   - Disk usage per mount point
  #   - Network I/O per interface
  #   - Load average, processes, file descriptors
  #
  # This runs with host network to access host metrics accurately.
  # It's the standard Prometheus host agent — used by millions.
  node-exporter:
    image: prom/node-exporter:v1.8
    container_name: node-exporter
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.systemd"
      - "--collector.processes"
      - "--no-collector.softnet"
      - "--no-collector.nfs"
      - "--no-collector.nfsd"

    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - monitoring

    ports:
      - "127.0.0.1:9100:9100"  # Admin access via Tailscale

  # ===========================================================================
  # CADVISOR — Container-level metrics
  # ===========================================================================
  # Exposes container resource usage metrics for Prometheus:
  #   - CPU usage per container
  #   - Memory usage per container
  #   - Network I/O per container
  #   - Filesystem I/O per container
  #
  # WHY cAdvisor instead of Docker metrics:
  #   - More detailed metrics (per-container network, block I/O)
  #   - Standard Prometheus format (directly consumable)
  #   - Historical data (Docker stats is real-time only)
  #   - Widely adopted in the monitoring community
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51
    container_name: cadvisor
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    command:
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
      - "--max_housekeeping_interval=60s"
      - "--event_storage_event_limit=default=0"
      - "--event_storage_age_limit=default=0"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro

    privileged: true  # Required for access to host cgroups and namespaces

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - monitoring

    ports:
      - "127.0.0.1:8082:8080"  # Admin access via Tailscale

  # ===========================================================================
  # POSTGRES EXPORTER — Database performance metrics
  # ===========================================================================
  # Exposes Postgres metrics for Prometheus:
  #   - Connection count and utilization
  #   - Transaction throughput (commits/rollbacks per second)
  #   - Cache hit ratio (shared buffers)
  #   - Table sizes and index usage
  #   - Replication lag
  #   - Long-running queries (>30s)
  #
  # Connects to the shared data Postgres instance (data network).
  # For multiple Postgres instances, deploy one exporter per instance.
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16
    container_name: postgres-exporter
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      DATA_SOURCE_NAME: "postgresql://${MONITORING_PG_USER:-postgres_exporter}:${MONITORING_PG_PASSWORD:?Must set MONITORING_PG_PASSWORD}@${MONITORING_PG_HOST:-postgres}:${MONITORING_PG_PORT:-5432}/postgres?sslmode=disable"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - monitoring
      # Uncomment to connect to the data network for Postgres access:
      # - data

  # ===========================================================================
  # REDIS EXPORTER — Cache/queue performance metrics
  # ===========================================================================
  # Exposes Redis metrics for Prometheus:
  #   - Memory usage and fragmentation
  #   - Connected clients
  #   - Command throughput (ops/sec)
  #   - Keyspace hit/miss ratio
  #   - Replication status
  #   - Stream/queue lengths
  redis-exporter:
    image: oliver006/redis_exporter:v1.67
    container_name: redis-exporter
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      REDIS_ADDR: "${MONITORING_REDIS_ADDR:-redis://redis:6379}"
      REDIS_PASSWORD: "${MONITORING_REDIS_PASSWORD:-}"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    networks:
      - monitoring
      # Uncomment to connect to the data network for Redis access:
      # - data

  # ===========================================================================
  # ALERTMANAGER — Alert routing, dedup, and notification
  # ===========================================================================
  # Receives alerts from Prometheus and routes them to notification channels.
  # This is a placeholder configuration — update alertmanager.yml with
  # your actual Slack/email/PagerDuty settings.
  #
  # Configuration: Mount your alertmanager.yml with actual receivers.
  # See: https://prometheus.io/docs/alerting/latest/configuration/
  #
  # Example alertmanager.yml:
  #   receivers:
  #     - name: 'slack'
  #       slack_configs:
  #         - api_url: 'https://hooks.slack.com/services/T.../B.../xxx'
  #           channel: '#alerts'
  #     - name: 'email'
  #       email_configs:
  #         - to: 'ops@wheeler.ai'
  #           from: 'alertmanager@wheeler.ai'
  #           smarthost: 'smtp.sendgrid.net:587'
  alertmanager:
    image: prom/alertmanager:v0.28
    container_name: alertmanager
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--data.retention=120h"
      - "--log.level=info"

    volumes:
      - alertmanager-data:/alertmanager
      # Uncomment with your config:
      # - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      # - ./alertmanager/templates:/etc/alertmanager/templates:ro

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - monitoring

    ports:
      - "127.0.0.1:9093:9093"  # Admin access via Tailscale

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  uptime-kuma-data:
    name: uptime-kuma-data
  prometheus-data:
    name: prometheus-data
  grafana-data:
    name: grafana-data
  alertmanager-data:
    name: alertmanager-data

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  monitoring:
    external: true
    name: monitoring
  traefik-public:
    external: true
    name: traefik-public
