# =============================================================================
# RavynAI — Full Stack Docker Compose
# =============================================================================
# RavynAI is an autonomous AI research and analysis platform. This compose
# file deploys the API server, background workers, database, and cache layer.
#
# Architecture:
#   api (FastAPI)  →  postgres  (research data, user data, models)
#                  →  redis     (task queues, caching, rate limiting)
#   worker  →  redis (Celery broker)  →  postgres (results)
#
# Network: All services on ravynai internal network.
#   API attaches to traefik-public for reverse proxy routing.
#
# Service ports (internal):
#   - API:      8007
#   - Postgres: 5434  (mapped to host for Tailscale DB access)
#   - Redis:    6379  (internal only)
# =============================================================================

services:
  # ===========================================================================
  # POSTGRES — Research database
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: ravynai-db
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      POSTGRES_DB: "${RAVYNAI_DB_NAME:-ravynai}"
      POSTGRES_USER: "${RAVYNAI_DB_USER:-ravynai}"
      POSTGRES_PASSWORD: "${RAVYNAI_DB_PASSWORD:?Must set RAVYNAI_DB_PASSWORD}"
      TZ: "${TZ:-UTC}"

    volumes:
      - ravynai-postgres:/var/lib/postgresql/data
      - type: tmpfs
        target: /var/lib/postgresql/data/pg_stat_tmp
        tmpfs:
          size: 64M

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${RAVYNAI_DB_USER:-ravynai} -d ${RAVYNAI_DB_NAME:-ravynai}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

    networks:
      - ravynai

    # Only expose on localhost for Tailscale/admin — NOT on 0.0.0.0
    ports:
      - "127.0.0.1:5434:5432"

  # ===========================================================================
  # REDIS — Task queue broker + cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: ravynai-redis
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000

    volumes:
      - ravynai-redis:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

    networks:
      - ravynai

  # ===========================================================================
  # API — FastAPI backend
  # ===========================================================================
  api:
    image: "${RAVYNAI_API_IMAGE:-ghcr.io/wheelerai/ravynai-api:latest}"
    container_name: ravynai-api
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          cpus: "1.0"
          memory: 1G

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      DATABASE_URL: "postgresql+asyncpg://${RAVYNAI_DB_USER:-ravynai}:${RAVYNAI_DB_PASSWORD}@postgres:5432/${RAVYNAI_DB_NAME:-ravynai}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      SECRET_KEY: "${RAVYNAI_SECRET_KEY:?Must set RAVYNAI_SECRET_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      CORS_ORIGINS: "${CORS_ORIGINS:-https://ravynai.wheeler.ai}"
      TZ: "${TZ:-UTC}"
      # RavynAI-specific settings
      MAX_CONCURRENT_RESEARCH: "${MAX_CONCURRENT_RESEARCH:-5}"
      RESEARCH_TIMEOUT_MINUTES: "${RESEARCH_TIMEOUT_MINUTES:-30}"

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8007/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    networks:
      - ravynai
      - traefik-public

    labels:
      - "traefik.enable=true"

      # API Router — handles all /api/* and root path
      - "traefik.http.routers.ravynai.rule=Host(`ravynai.wheeler.ai`)"
      - "traefik.http.routers.ravynai.entrypoints=websecure"
      - "traefik.http.routers.ravynai.tls=true"
      - "traefik.http.routers.ravynai.tls.certresolver=letsencrypt-staging"
      - "traefik.http.routers.ravynai.middlewares=chain-public@file"
      - "traefik.http.services.ravynai.loadbalancer.server.port=8007"
      - "traefik.http.services.ravynai.loadbalancer.healthCheck.path=/health"
      - "traefik.http.services.ravynai.loadbalancer.healthCheck.interval=30s"

  # ===========================================================================
  # WORKER — Celery worker for async AI research tasks
  # ===========================================================================
  worker:
    image: "${RAVYNAI_WORKER_IMAGE:-ghcr.io/wheelerai/ravynai-worker:latest}"
    container_name: ravynai-worker
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "6.0"
          memory: 8G
        reservations:
          cpus: "2.0"
          memory: 2G

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      DATABASE_URL: "postgresql+asyncpg://${RAVYNAI_DB_USER:-ravynai}:${RAVYNAI_DB_PASSWORD}@postgres:5432/${RAVYNAI_DB_NAME:-ravynai}"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      SECRET_KEY: "${RAVYNAI_SECRET_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      TZ: "${TZ:-UTC}"
      CELERY_CONCURRENCY: "${RAVYNAI_CELERY_CONCURRENCY:-2}"
      # Workers need model access — typically these are mounted or pulled
      # at runtime. For cloud AI providers (OpenAI, Anthropic), only API keys.
      # For local models, mount the model directory:
      # volumes:
      #   - /opt/models:/models:ro

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks inspect ping -d celery@$$HOSTNAME || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - ravynai

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  ravynai-postgres:
    name: ravynai-postgres
  ravynai-redis:
    name: ravynai-redis

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  ravynai:
    external: true
    name: ravynai
  traefik-public:
    external: true
    name: traefik-public
