# =============================================================================
# Management Stack — Portainer + Dockge
# =============================================================================
# Container management UIs for the CPX51 server.
#
# WHY both:
#   - Portainer: Full Docker management (containers, networks, volumes, images)
#   - Dockge: Docker Compose-focused management (stack editor, compose files)
#   - Together they provide complete container lifecycle management
#
# Security:
#   - Both are Tailscale-only (no public exposure)
#   - Both require authentication
#   - Portainer uses port 9443 (HTTPS) and 9000 is NOT exposed
#   - Dockge uses port 5001
# =============================================================================

services:
  # ===========================================================================
  # PORTAINER — Full Docker Management UI
  # ===========================================================================
  # Provides a complete Docker management interface:
  #   - Container start/stop/restart/logs
  #   - Image management (pull, tag, push)
  #   - Network management
  #   - Volume management
  #   - Stack deployment (via Portainer's compose editor)
  #
  # First-time setup:
  #   1. Access https://portainer.internal.wheeler.ai
  #   2. Create admin user (use strong password from .env)
  #   3. Connect to local Docker environment
  #   4. Start managing containers
  #
  # Architecture:
  #   - portainer: Main service (web UI + API)
  #   - portainer-agent: (optional) For managing remote hosts
  #     Not needed here since Portainer manages the local Docker socket
  portainer:
    image: portainer/portainer-ce:2.27
    container_name: portainer
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "https://localhost:9443"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    networks:
      - management
      - traefik-public

    labels:
      - "traefik.enable=true"

      # Portainer Web UI — Tailscale only
      - "traefik.http.routers.portainer.rule=Host(`portainer.internal.wheeler.ai`)"
      - "traefik.http.routers.portainer.entrypoints=websecure"
      - "traefik.http.routers.portainer.tls=true"
      - "traefik.http.routers.portainer.tls.certresolver=letsencrypt-staging"
      - "traefik.http.routers.portainer.middlewares=chain-admin@file"
      - "traefik.http.services.portainer.loadbalancer.server.port=9443"
      - "traefik.http.services.portainer.loadbalancer.server.scheme=https"
      - "traefik.http.services.portainer.loadbalancer.serversTransport=insecureTransport@file"

  # ===========================================================================
  # DOCKGE — Docker Compose Management UI
  # ===========================================================================
  # Lightweight Compose-file-focused manager:
  #   - Edit compose files in-browser
  #   - Deploy/update stacks with one click
  #   - View compose file logs
  #   - Environment variable management
  #
  # WHY Dockge alongside Portainer:
  #   - Portainer is better for general container ops
  #   - Dockge is better for compose file management
  #   - Dockge stores compose files on the filesystem for easy editing
  #   - Dockge shows compose file syntax and structure more clearly
  #
  # Compose files location: /opt/dockge/stacks
  dockge:
    image: louislam/dockge:1
    container_name: dockge
    restart: unless-stopped

    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    environment:
      DOCKGE_PORT: "5001"
      TZ: "${TZ:-UTC}"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dockge-data:/app/data
      # Dockge stores compose files at /opt/dockge/stacks by default
      # Map this to a persistent location for easy editing:
      - /opt/dockge/stacks:/opt/stacks:rw

    healthcheck:
      test: ["CMD", "node", "/app/server.js", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - management
      - traefik-public

    labels:
      - "traefik.enable=true"

      # Dockge Web UI — Tailscale only
      - "traefik.http.routers.dockge.rule=Host(`dockge.internal.wheeler.ai`)"
      - "traefik.http.routers.dockge.entrypoints=websecure"
      - "traefik.http.routers.dockge.tls=true"
      - "traefik.http.routers.dockge.tls.certresolver=letsencrypt-staging"
      - "traefik.http.routers.dockge.middlewares=chain-admin@file"
      - "traefik.http.services.dockge.loadbalancer.server.port=5001"

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  portainer-data:
    name: portainer-data
  dockge-data:
    name: dockge-data

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  management:
    external: true
    name: management
  traefik-public:
    external: true
    name: traefik-public
