# =============================================================================
# Kernel Hardening via sysctl — Shared Configuration (Hetzner & Hostinger)
# =============================================================================
#
# Security Rationale:
#   Kernel parameters control low-level networking and memory behavior.
#   Misconfigured defaults can allow IP spoofing, SYN floods, source routing
#   attacks, and other network-level exploits.
#
#   This file applies all the "boring but essential" kernel hardening that
#   every production server should have. None of these are Docker-specific;
#   they apply to the host kernel directly.
#
# Deployment:
#   sudo cp sysctl-hardening.conf /etc/sysctl.d/99-security-hardening.conf
#   sudo sysctl --system
#
# Or via the install function at the bottom of this script.
#
# Validation:
#   sudo sysctl -a 2>/dev/null | grep -E 'net.ipv4.conf.all.(rp_filter|accept_redirects|log_martians)'
#   sudo sysctl net.ipv4.tcp_congestion_control
#
# http://docs.docker.com/engine/security/
# https://www.kernel.org/doc/html/latest/networking/ip-sysctl.html
# =============================================================================

# ═════════════════════════════════════════════════════════════════════════════
# NETWORK — IPv4
# ═════════════════════════════════════════════════════════════════════════════

# ─── IP Forwarding ───────────────────────────────────────────────────────────
# Required for Docker networking and inter-container communication.
# Docker sets this automatically, but we set it explicitly as a safeguard.
net.ipv4.ip_forward = 1

# ─── Reverse Path Filtering (RPF) ───────────────────────────────────────────
# Rationale: Strict RPF prevents IP spoofing by dropping packets that arrive
# on an interface that the kernel would NOT use to reach the source IP.
# This is the single most important anti-spoofing measure.
# 0 = off, 1 = strict, 2 = loose
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# ─── ICMP Redirects ─────────────────────────────────────────────────────────
# Rationale: ICMP redirects tell a host to use a different gateway.
# Attackers can use forged ICMP redirects to reroute traffic through
# their machine (man-in-the-middle). We never need these.
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
# Also disable sending redirects (we shouldn't redirect anyone)
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.default.send_redirects = 0

# ─── Source Routing ─────────────────────────────────────────────────────────
# Rationale: Source routing lets the sender specify the route a packet takes.
# Attackers use this to bypass firewalls and route traffic through
# unexpected paths. Disable completely.
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0

# ─── SYN Flood Protection ───────────────────────────────────────────────────
# Rationale: SYN cookies allow the kernel to handle SYN flood DoS attacks
# without allocating memory for each half-open connection. This is critical
# for any public-facing server.
net.ipv4.tcp_syncookies = 1

# ─── SYN Backlog ────────────────────────────────────────────────────────────
# Rationale: Increase the number of SYN_RECV connections the kernel will
# hold before falling back to SYN cookies. Higher values help legitimate
# traffic under moderate load.
net.ipv4.tcp_max_syn_backlog = 8192

# ─── SYN + ACK Retries ──────────────────────────────────────────────────────
# Rationale: Reduce the number of SYN and SYN-ACK retries to quickly drop
# failed connection attempts. This frees resources faster under attack.
net.ipv4.tcp_syn_retries = 3      # Default: 6
net.ipv4.tcp_synack_retries = 3   # Default: 5

# ─── TCP Keepalive ──────────────────────────────────────────────────────────
# Rationale: TCP keepalive detects dead peers. These settings balance
# responsiveness (first probe after 60s) with bandwidth (3 probes, 10s apart).
# Total time to detect dead peer: 60 + (3 * 10) = 90 seconds.
net.ipv4.tcp_keepalive_time = 60
net.ipv4.tcp_keepalive_intvl = 10
net.ipv4.tcp_keepalive_probes = 3

# ─── TIME_WAIT Reuse ────────────────────────────────────────────────────────
# Rationale: Allow reuse of TIME_WAIT sockets for new connections.
# This helps with high-throughput servers that create many short connections.
# Only enable if you understand the implications (can cause issues with NAT).
net.ipv4.tcp_tw_reuse = 1

# ─── FIN-WAIT-2 Timeout ─────────────────────────────────────────────────────
# Rationale: Reduce the time a connection stays in FIN-WAIT-2 state.
# The default (60s) can accumulate many zombie connections under load.
net.ipv4.tcp_fin_timeout = 15

# ─── Connection Tracking ────────────────────────────────────────────────────
# Rationale: Increase the maximum number of tracked connections.
# Default (65536) is too low for a server with Docker running many containers.
# Each container can easily create hundreds of connections.
net.netfilter.nf_conntrack_max = 131072
net.netfilter.nf_conntrack_tcp_timeout_established = 86400  # 24 hours

# ─── ICMP Echo (Ping) ───────────────────────────────────────────────────────
# Rationale: Respond to pings for basic network troubleshooting.
# Disabling ping breaks PMTU discovery, which causes TCP performance issues.
# Keep enabled unless you have a specific compliance requirement.
net.ipv4.icmp_echo_ignore_all = 0
net.ipv4.icmp_echo_ignore_broadcasts = 1  # Ignore broadcast pings (smurf attacks)

# ─── ICMP Error Rate Limiting ───────────────────────────────────────────────
# Rationale: Rate-limit ICMP error messages to prevent kernel from being
# overwhelmed by a flood of packets that trigger "unreachable" responses.
net.ipv4.icmp_ratelimit = 100
net.ipv4.icmp_ratemask = 6160  # Default: only limit specific ICMP types

# ─── Martians (Bogon) Logging ───────────────────────────────────────────────
# Rationale: Log packets with impossible source addresses (e.g., RFC1918
# addresses arriving from the internet). This helps detect spoofing attacks.
# Only enable on public-facing interfaces to avoid log noise.
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# ─── ARP Filtering ──────────────────────────────────────────────────────────
# Rationale: ARP filtering prevents ARP spoofing and ensures ARP replies
# are only sent for addresses that belong to the receiving interface.
net.ipv4.conf.all.arp_filter = 1
net.ipv4.conf.default.arp_filter = 1
net.ipv4.conf.all.arp_ignore = 1
net.ipv4.conf.default.arp_ignore = 1
net.ipv4.conf.all.arp_announce = 2
net.ipv4.conf.default.arp_announce = 2

# ═════════════════════════════════════════════════════════════════════════════
# NETWORK — IPv6
# ═════════════════════════════════════════════════════════════════════════════

# ─── Disable IPv6 Router Advertisements ─────────────────────────────────────
# Rationale: Router Advertisements can be spoofed by attackers on the same
# network segment to redirect traffic or perform MITM attacks.
net.ipv6.conf.all.accept_ra = 0
net.ipv6.conf.default.accept_ra = 0

# ─── IPv6 Redirects ────────────────────────────────────────────────────────
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# ═════════════════════════════════════════════════════════════════════════════
# TCP CONGESTION CONTROL
# ═════════════════════════════════════════════════════════════════════════════

# ─── BBR Congestion Control ─────────────────────────────────────────────────
# Rationale: BBR (Bottleneck Bandwidth and Round-trip) is Google's modern
# congestion control algorithm. It significantly outperforms CUBIC on:
#   - Throughput (especially over long distances)
#   - Fairness (doesn't steal bandwidth from other flows)
#   - Bufferbloat resistance (doesn't fill buffers unnecessarily)
# Requires kernel 4.9+ and the tcp_bbr module.
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq  # Fair Queueing — BBR requires this qdisc

# Load BBR module if available
# (handled by the sysctl module loading, but we can ensure it here)

# ═════════════════════════════════════════════════════════════════════════════
# KERNEL — General Security
# ═════════════════════════════════════════════════════════════════════════════

# ─── Core Dumps ─────────────────────────────────────────────────────────────
# Rationale: Core dumps can contain sensitive data (passwords, keys, memory
# contents). Disable them in production to prevent data leakage.
# If you need core dumps for debugging, set this to 0 temporarily.
kernel.core_uses_pid = 1
fs.suid_dumpable = 0  # Never dump core for SUID programs

# ─── Magic SysRq ────────────────────────────────────────────────────────────
# Rationale: Magic SysRq allows certain keyboard commands even when the
# system appears hung. It's useful for server recovery but can be dangerous.
# 1 = enable all functions, 0 = disable all, 176 = sync+unmount+reboot only
# Set to a safe subset: 16 = sync (0x10), 32 = remount (0x20), 64 = reboot (0x40)
kernel.sysrq = 1  # Keep enabled for emergency recovery via IPMI/serial console

# ─── Kernel Pointer Hiding ──────────────────────────────────────────────────
# Rationale: Hides kernel pointer values in /proc and other interfaces,
# making it harder for attackers to determine kernel memory layout for
# exploit development.
kernel.kptr_restrict = 1  # 2 = always restrict, 1 = restrict for non-root

# ─── Kernel Address Space Layout (KASLR) ────────────────────────────────────
# Cannot be set via sysctl (boot parameter). Just a reminder:
# Ensure KASLR is enabled in your boot loader:
#   GRUB_CMDLINE_LINUX_DEFAULT="... kaslr ..."

# ─── dmesg Restriction ─────────────────────────────────────────────────────
# Rationale: Prevents non-root users from reading kernel ring buffer (dmesg),
# which can leak sensitive kernel addresses and configuration.
kernel.dmesg_restrict = 1

# ─── BPF JIT Hardening ────────────────────────────────────────────────────
# Rationale: JIT hardening randomizes the address of BPF programs, making
# JIT spraying attacks much harder to execute.
net.core.bpf_jit_harden = 1  # 2 = full hardening with constant blinding

# ═════════════════════════════════════════════════════════════════════════════
# RESOURCE LIMITS
# ═════════════════════════════════════════════════════════════════════════════

# ─── File Descriptors ───────────────────────────────────────────────────────
# Rationale: Docker containers and services can open many file descriptors.
# The default (usually 1024/4096) is far too low. Increase significantly.
# 65535 is a reasonable production default.
fs.file-max = 65535
fs.nr_open = 65535

# ─── PID Limit ──────────────────────────────────────────────────────────────
# Rationale: Prevent fork bombs from exhausting the PID table.
# 65536 is 10x the default and provides room for many containers.
kernel.pid_max = 65536

# ─── User Watches ───────────────────────────────────────────────────────────
# Rationale: Increase the number of inotify watches available for file
# monitoring services (e.g., Traefik config watchers, log shippers).
fs.inotify.max_user_watches = 65536
fs.inotify.max_user_instances = 1024

# ═════════════════════════════════════════════════════════════════════════════
# VIRTUAL MEMORY
# ═════════════════════════════════════════════════════════════════════════════

# ─── VM Overcommit ──────────────────────────────────────────────────────────
# Rationale: Control memory overcommit behavior.
# 0 = heuristic overcommit (default), 1 = always overcommit, 2 = don't overcommit
# 2 is safest (never overcommit) but can cause issues with some apps.
vm.overcommit_memory = 1
vm.overcommit_ratio = 50  # Allow 50% overcommit

# ─── Dirty Page Ratios ──────────────────────────────────────────────────────
# Rationale: Control when dirty pages are written to disk.
# Lower = more frequent writes (less data loss on crash, more I/O).
# Higher = less frequent writes (more data loss on crash, better I/O).
vm.dirty_ratio = 30       # % of memory that can be dirty before blocking
vm.dirty_background_ratio = 5  # % of memory that triggers background writeback

# ─── Swappiness ─────────────────────────────────────────────────────────────
# Rationale: Swappiness controls the kernel's tendency to swap.
# 0 = only swap to avoid OOM, 100 = aggressively swap.
# For Docker servers: low swappiness keeps containers in memory.
# 10 = good balance (swap only under memory pressure)
vm.swappiness = 10

# ═════════════════════════════════════════════════════════════════════════════
# NETWORK — General
# ═════════════════════════════════════════════════════════════════════════════

# ─── Socket Buffer Sizes ────────────────────────────────────────────────────
# Rationale: Increase default and maximum socket buffer sizes for better
# network throughput, especially for reverse proxies and database connections.
# Format: min default max (bytes)
net.core.rmem_default = 262144    # 256KB
net.core.wmem_default = 262144    # 256KB
net.core.rmem_max = 16777216      # 16MB
net.core.wmem_max = 16777216      # 16MB

# ─── TCP Buffer Sizes ───────────────────────────────────────────────────────
# Rationale: Tuned for high-throughput connections.
# Format: min default max (bytes)
net.ipv4.tcp_rmem = 4096 131072 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# ─── TCP Slow Start After Idle ──────────────────────────────────────────────
# Rationale: Disable slow start after idle. Prevents performance degradation
# for connections that go idle briefly (e.g., database connection pools).
net.ipv4.tcp_slow_start_after_idle = 0

# ─── TCP MTU Probing ────────────────────────────────────────────────────────
# Rationale: Enable MTU probing to avoid fragmentation.
# Helps with PMTU issues behind certain VPNs and tunnels.
net.ipv4.tcp_mtu_probing = 1

# ─── For more details, see:
#   https://github.com/trimstray/htop-guide
#   https://docs.docker.com/engine/security/
# =============================================================================
