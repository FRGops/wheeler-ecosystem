#!/usr/bin/env bash
# =============================================================================
# Wheeler Enterprise — Observability Stack Docker Compose
# =============================================================================
# Complete enterprise monitoring stack including Loki + Promtail for logs.
#
# Services:
#   Prometheus       — Metrics collection (port 9090)
#   Grafana          — Dashboards (port 3002)
#   Loki             — Log aggregation (port 3100)
#   Promtail         — Log collector (port 9080)
#   Alertmanager     — Alert routing (port 9093)
#   Netdata          — Real-time metrics (port 19999)
#   Uptime Kuma      — Synthetic checks (port 3001)
#   Node Exporter    — Host metrics (port 9100)
#   cAdvisor         — Container metrics (port 8080)
#   Postgres Exp     — Database metrics (port 9187)
#   Redis Exp        — Cache metrics (port 9121)
#
# Networks:
#   monitoring       — Internal metrics network
#   traefik-public   — Web-facing services (Grafana, Uptime Kuma)
#
# Usage:
#   docker-compose -f observability-stack.yml up -d
# =============================================================================
version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════════════
  # PROMETHEUS — Metrics collection and alerting engine
  # ═══════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.55
    container_name: prometheus
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "2.0", memory: 4G }
        reservations: { cpus: "0.5", memory: 1G }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--query.max-concurrency=20'
      - '--query.timeout=2m'
      - '--storage.tsdb.wal-compression'
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [monitoring]
    ports: ["127.0.0.1:9090:9090"]

  # ═══════════════════════════════════════════════════════════════════════
  # GRAFANA — Dashboards and visualization
  # ═══════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.3
    container_name: grafana
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1G }
        reservations: { cpus: "0.25", memory: 256M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:?Required}"
      GF_INSTALL_PLUGINS: "grafana-piechart-panel,grafana-clock-panel"
      GF_SERVER_ROOT_URL: "https://grafana.wheeler.ai"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_LOG_LEVEL: "info"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_UNIFIED_ALERTING_ENABLED: "true"
      GF_ALERTING_ENABLED: "true"
      TZ: "UTC"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/alerting:/etc/grafana/provisioning/alerting:ro
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [monitoring, traefik-public]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.wheeler.ai`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=letsencrypt"
      - "traefik.http.routers.grafana.middlewares=chain-public@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3002"

  # ═══════════════════════════════════════════════════════════════════════
  # LOKI — Log aggregation and storage
  # ═══════════════════════════════════════════════════════════════════════
  loki:
    image: grafana/loki:3.7.2
    container_name: loki
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 2G }
        reservations: { cpus: "0.25", memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    command:
      - '-config.file=/etc/loki/loki-config.yml'
      - '-target=all'
      - '-log.level=info'
    volumes:
      - loki-data:/loki
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [monitoring]
    ports: ["127.0.0.1:3100:3100"]

  # ═══════════════════════════════════════════════════════════════════════
  # PROMTAIL — Log collector (ships to Loki)
  # ═══════════════════════════════════════════════════════════════════════
  promtail:
    image: grafana/promtail:3.6.8
    container_name: promtail
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
        reservations: { cpus: "0.1", memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    command:
      - '-config.file=/etc/promtail/promtail-config.yml'
      - '-config.expand-env=true'
    environment:
      SERVER_NAME: "${SERVER_NAME:-aiops}"
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /root/.pm2/logs:/root/.pm2/logs:ro
      - promtail-positions:/tmp
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]
    ports: ["127.0.0.1:9080:9080"]

  # ═══════════════════════════════════════════════════════════════════════
  # ALERTMANAGER — Alert routing, deduplication, silencing
  # ═══════════════════════════════════════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.28
    container_name: alertmanager
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
        reservations: { cpus: "0.1", memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--data.retention=120h'
      - '--log.level=info'
    volumes:
      - alertmanager-data:/alertmanager
      - ./alertmanager/alertmanager-config.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]
    ports: ["127.0.0.1:9093:9093"]

  # ═══════════════════════════════════════════════════════════════════════
  # UPTIME KUMA — Synthetic monitoring + status page
  # ═══════════════════════════════════════════════════════════════════════
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }
        reservations: { cpus: "0.1", memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    volumes:
      - uptime-kuma-data:/app/data
    healthcheck:
      test: ["CMD", "node", "server/server.js", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks: [monitoring, traefik-public]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime.rule=Host(`uptime.wheeler.ai`)"
      - "traefik.http.routers.uptime.entrypoints=websecure"
      - "traefik.http.routers.uptime.tls=true"
      - "traefik.http.routers.uptime.tls.certresolver=letsencrypt"
      - "traefik.http.routers.uptime.middlewares=chain-public@file"
      - "traefik.http.services.uptime.loadbalancer.server.port=3001"

  # ═══════════════════════════════════════════════════════════════════════
  # NODE EXPORTER — Host-level system metrics
  # ═══════════════════════════════════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.8
    container_name: node-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }
        reservations: { cpus: "0.05", memory: 64M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.systemd'
      - '--collector.processes'
      - '--no-collector.softnet'
    volumes:
      - /:/host:ro,rslave
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]
    ports: ["127.0.0.1:9100:9100"]

  # ═══════════════════════════════════════════════════════════════════════
  # CADVISOR — Container-level metrics
  # ═══════════════════════════════════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.51
    container_name: cadvisor
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }
        reservations: { cpus: "0.1", memory: 128M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=30s'
      - '--max_housekeeping_interval=60s'
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]
    ports: ["127.0.0.1:8082:8080"]

  # ═══════════════════════════════════════════════════════════════════════
  # POSTGRES EXPORTER — Database metrics
  # ═══════════════════════════════════════════════════════════════════════
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16
    container_name: postgres-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }
        reservations: { cpus: "0.05", memory: 64M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    environment:
      DATA_SOURCE_NAME: "postgresql://${MONITORING_PG_USER}:${MONITORING_PG_PASSWORD}@${MONITORING_PG_HOST:-postgres}:5432/postgres?sslmode=disable"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]

  # ═══════════════════════════════════════════════════════════════════════
  # REDIS EXPORTER — Cache metrics
  # ═══════════════════════════════════════════════════════════════════════
  redis-exporter:
    image: oliver006/redis_exporter:v1.67
    container_name: redis-exporter
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }
        reservations: { cpus: "0.05", memory: 64M }
    logging:
      driver: json-file
      options: { max-size: "50m", max-file: "3" }
    environment:
      REDIS_ADDR: "${MONITORING_REDIS_ADDR:-redis://redis:6379}"
      REDIS_PASSWORD: "${MONITORING_REDIS_PASSWORD:-}"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [monitoring]

# ══════════════════════════════════════════════════════════════════════════
# VOLUMES
# ══════════════════════════════════════════════════════════════════════════
volumes:
  prometheus-data:
    name: enterprise_prometheus-data
  grafana-data:
    name: enterprise_grafana-data
  loki-data:
    name: enterprise_loki-data
  promtail-positions:
    name: enterprise_promtail-positions
  alertmanager-data:
    name: enterprise_alertmanager-data
  uptime-kuma-data:
    name: enterprise_uptime-kuma-data

# ══════════════════════════════════════════════════════════════════════════
# NETWORKS
# ══════════════════════════════════════════════════════════════════════════
networks:
  monitoring:
    external: true
    name: monitoring
  traefik-public:
    external: true
    name: traefik-public
