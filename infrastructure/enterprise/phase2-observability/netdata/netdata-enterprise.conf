# =============================================================================
# Wheeler Enterprise — Netdata Configuration
# Deploy to: /etc/netdata/netdata.conf (primary AIOPS config)
# =============================================================================
# Netdata is the 1-second resolution monitoring layer. Prometheus scrapes
# its /api/v1/all endpoint for long-term storage. Netdata handles the
# real-time detection; Prometheus handles trends and alerting.
# =============================================================================

[global]
  run as user = netdata
  hostname = ${HOSTNAME}
  history = 7200  # Keep 2 hours of 1-second data (RAM-based)
  update every = 1
  config directory = /etc/netdata
  stock config directory = /usr/lib/netdata/conf.d
  log directory = /var/log/netdata
  web files directory = /usr/share/netdata/web
  cache directory = /var/cache/netdata
  lib directory = /var/lib/netdata
  home directory = /var/lib/netdata
  lock directory = /var/lib/netdata/lock
  plugins directory = /usr/libexec/netdata/plugins.d

[web]
  enabled = yes
  bind to = 0.0.0.0
  default port = 19999
  # Only Tailscale + localhost should reach this port (enforced by UFW)
  allow connections from = localhost 100.64.0.0/10
  respect do not track policy = yes
  enable gzip = yes

[health]
  enabled = yes
  # Netdata's built-in health uses its own alerting.
  # We ALSO alert via Prometheus (for historical context).
  # Disable Netdata alarms if they duplicate Prometheus alerts.
  enabled alarms = yes
  run at least every = 10
  postpone alarms during hibernation = yes
  in memory max health log entries = 1000

  # Notification integrations (Netdata's own alerting)
  script to execute on alarm = /usr/libexec/netdata/plugins.d/alarm-notify.sh

[registry]
  enabled = no  # We don't need Netdata's central registry

[backend]
  # Prometheus metrics export — this is what Prometheus scrapes
  enabled = yes
  data source = average
  type = prometheus_remote_write
  destination = localhost:7200
  prefix = netdata
  hostname = ${HOSTNAME}
  update every = 1
  buffer on failures = 10
  send charts matching = *

# ── Plugin Tuning ────────────────────────────────────────────────────────

[plugins]
  # Disable collectors we don't need (reduce CPU overhead)
  nfacct = no       # Netfilter accounting (heavy, not needed)
  ebpf = no         # eBPF is powerful but adds CPU overhead on busy servers
  cups = no         # Printing — not relevant
  freeipmi = no     # IPMI hardware monitoring (not available on cloud VMs)
  perf = no         # perf events (intrusive on production)
  xenstat = no      # Xen virtualization (not using Xen)

  # Enable essential collectors
  proc = yes        # /proc filesystem metrics
  diskspace = yes   # Disk usage
  cgroups = yes     # Container cgroup metrics
  tc = yes          # Traffic control / QoS
  python.d = yes    # Python plugin framework
  go.d = yes        # Go plugin framework
  apps = yes        # Per-process metrics
  slabinfo = yes    # Kernel slab memory

[plugin:proc]
  # /proc based system metrics
  netdata server resources = yes
  /proc/stat = yes
  /proc/meminfo = yes
  /proc/net/dev = yes
  /proc/diskstats = yes
  /proc/loadavg = yes
  /proc/uptime = yes
  /proc/vmstat = yes
  /proc/pressure = yes  # Linux PSI (Pressure Stall Information)

[plugin:tc]
  script to run to get tc data = /usr/libexec/netdata/plugins.d/tc-qos-helper.sh

[plugin:apps]
  update every = 5

[plugin:go.d]
  update every = 1

[plugin:python.d]
  update every = 1

# ── Database Tier ─────────────────────────────────────────────────────────
# Netdata stores metrics in RAM by default. For longer retention, configure
# a database backend (not needed since Prometheus handles long-term).
# If you want Netdata to retain >2h locally:

[db]
  mode = dbengine
  storage tiers = 2
  # Tier 0: 2 hours of per-second data (~500MB)
  dbengine tier 0 retention size = 512
  # Tier 1: 48 hours of per-minute data (~200MB)
  dbengine tier 1 retention size = 256
  # Total: ~750MB RAM for 48h of data

# ── Streaming ─────────────────────────────────────────────────────────────
# If you want to stream to a parent Netdata (e.g., centralized dashboard):
# [stream]
#   enabled = yes
#   destination = 100.121.230.28:19999  # AIOPS as central
#   api key = xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
