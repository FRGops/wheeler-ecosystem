# =============================================================================
# Wheeler Enterprise — Loki Configuration (Log Aggregation)
# =============================================================================
# Loki runs on AIOPS as the central log aggregation point for all 3 servers.
# Each server runs Promtail which ships logs to this Loki instance.
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

# ── Ingester ─────────────────────────────────────────────────────────────
# Handles incoming log streams. 3 replicas for HA within a single instance.
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  wal:
    dir: /loki/wal
  chunk_idle_period: 30m
  chunk_retain_period: 1m
  max_chunk_age: 2h
  chunk_target_size: 1572864  # 1.5MB — balances query speed vs storage overhead
  chunk_encoding: snappy

# ── Schema ───────────────────────────────────────────────────────────────
schema_config:
  configs:
    # v12 schema: tsdb-based index with structured metadata
    - from: "2025-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: wheeler_index_
        period: 24h  # One index per day — query up to 24 hours at a time cheaply

# ── Storage ──────────────────────────────────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

# ── Retention ────────────────────────────────────────────────────────────
# 90 days retention. Adjust per compliance requirements.
# COREDB audit logs: 365 days (handled by separate promtail pipeline)
table_manager:
  retention_deletes_enabled: true
  retention_period: 2160h  # 90 days

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h  # Reject logs older than 7 days
  max_entries_limit_per_query: 5000
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 30m
  ingestion_rate_mb: 16       # 16 MB/s ingestion limit
  ingestion_burst_size_mb: 32  # Burst to 32 MB
  per_stream_rate_limit: 8MB   # Per-tenant rate limit
  per_stream_rate_limit_burst: 16MB
  max_global_streams_per_user: 5000
  max_chunks_per_query: 2000000
  max_label_name_length: 1024
  max_label_value_length: 2048
  max_label_names_per_series: 30

# ── Query Frontend ───────────────────────────────────────────────────────
query_range:
  max_retries: 3
  parallelise_shardable_queries: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 256

# ── Compactor ────────────────────────────────────────────────────────────
# Compacts old chunks into larger blocks for better query performance
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

# ── Ruler (Alerting from logs) ───────────────────────────────────────────
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true

# ── Analytics ────────────────────────────────────────────────────────────
analytics:
  reporting_enabled: false
