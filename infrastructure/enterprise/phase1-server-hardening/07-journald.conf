# =============================================================================
# Wheeler Enterprise — systemd-journald Limits
# Deploy to: /etc/systemd/journald.conf.d/99-wheeler-enterprise.conf
# =============================================================================
# Controls journald disk usage and retention. We forward to Loki for
# long-term log storage, so local retention is limited.
# =============================================================================

[Journal]
# ── Storage ──────────────────────────────────────────────────────────────
# persistent = store on disk, survives reboots
# auto = store on disk if /var/log/journal exists, else in /run (volatile)
Storage=persistent

# ── Compression ──────────────────────────────────────────────────────────
# Compress logs larger than 512 bytes (reduces disk usage ~70%)
Compress=yes
CompressThreshold=512B

# ── Disk Limits ──────────────────────────────────────────────────────────
# Keep journald usage under control
# RuntimeMaxUse: max space in /run (volatile)
# SystemMaxUse: max space in /var/log/journal (persistent)
# MaxFileSize: max per-file before rotation
RuntimeMaxUse=256M
SystemMaxUse=4G
SystemMaxFileSize=256M

# ── Retention ────────────────────────────────────────────────────────────
# Keep 14 days locally. Loki stores the long tail.
MaxRetentionSec=1209600

# ── Forwarding ───────────────────────────────────────────────────────────
# Forward to syslog for legacy compatibility (fail2ban reads auth.log)
ForwardToSyslog=yes
ForwardToWall=no

# ── Rate Limiting ────────────────────────────────────────────────────────
# Allow higher log rates for busy Docker hosts
RateLimitIntervalSec=10
RateLimitBurst=50000

# ── Synchronization ──────────────────────────────────────────────────────
# Sync every 5 minutes (safety vs performance balance)
SyncIntervalSec=300
