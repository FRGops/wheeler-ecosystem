# =============================================================================
# Wheeler Enterprise — Log Rotation Configuration
# Deploy to: /etc/logrotate.d/wheeler-enterprise
# =============================================================================
# Covers: Docker container logs, PM2 logs, nginx, Traefik, system logs.
# Each log type has different retention based on compliance and debugging needs.
# =============================================================================

# ── Docker Container Logs ────────────────────────────────────────────────
# Docker daemon.json already sets max-size:50m, max-file:3
# This is a secondary rotation for any Docker logs outside that path

/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    size 100M
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
    dateext
}

# ── PM2 Application Logs ─────────────────────────────────────────────────
# PM2 logrotate module handles runtime rotation. This covers cold storage.

/root/.pm2/logs/*.log {
    daily
    rotate 14
    size 100M
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
    dateext
    postrotate
        pm2 reloadLogs 2>/dev/null || true
    endscript
}

# ── Nginx (EDGE and AIOPS servers) ───────────────────────────────────────

/var/log/nginx/*.log {
    daily
    rotate 30
    size 100M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid)
    endscript
}

# ── Traefik ───────────────────────────────────────────────────────────────

/var/log/traefik/*.log {
    daily
    rotate 14
    size 100M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    postrotate
        docker kill -s USR1 traefik 2>/dev/null || true
    endscript
}

# ── PostgreSQL ────────────────────────────────────────────────────────────

/var/log/postgresql/*.log {
    daily
    rotate 30
    size 50M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    postrotate
        /usr/bin/pg_ctl reload -D /var/lib/postgresql/*/main 2>/dev/null || true
    endscript
}

# ── Redis ─────────────────────────────────────────────────────────────────

/var/log/redis/*.log {
    daily
    rotate 14
    size 50M
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
    dateext
}

# ── System Auth Log ──────────────────────────────────────────────────────
# Needed for fail2ban + security auditing

/var/log/auth.log {
    daily
    rotate 14
    size 50M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    postrotate
        systemctl kill -s HUP rsyslog.service 2>/dev/null || true
    endscript
}

# ── System Log ────────────────────────────────────────────────────────────

/var/log/syslog {
    daily
    rotate 7
    size 100M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    postrotate
        systemctl kill -s HUP rsyslog.service 2>/dev/null || true
    endscript
}

# ── AI Agent Structured Logs ─────────────────────────────────────────────
# Centralized JSON logs from AI agents (LiteLLM, LangFlow, custom agents)

/var/log/wheeler/agents/*.log {
    daily
    rotate 90
    size 50M
    missingok
    notifempty
    compress
    delaycompress
    dateext
    copytruncate
}

# ── Backup Logs ───────────────────────────────────────────────────────────

/root/infrastructure/backups/logs/*.log {
    monthly
    rotate 12
    size 10M
    missingok
    notifempty
    compress
    dateext
}
