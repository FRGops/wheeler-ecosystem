# =============================================================================
# Wheeler Enterprise — System Limits
# Deploy to: /etc/security/limits.d/99-wheeler-enterprise.conf
# =============================================================================
# These are PAM-based resource limits. They set the UPPER BOUND.
# Docker containers get their own limits via compose/daemon.json.
# =============================================================================

# ── Root ──────────────────────────────────────────────────────────────────
root    soft    nofile      524288
root    hard    nofile      1048576
root    soft    nproc       131072
root    hard    nproc       262144
root    soft    memlock     unlimited
root    hard    memlock     unlimited

# ── All Users (wildcard) ─────────────────────────────────────────────────
*       soft    nofile      262144
*       hard    nofile      524288
*       soft    nproc       65536
*       hard    nproc       131072
*       soft    memlock     8388608
*       hard    memlock     16777216

# ── Docker ────────────────────────────────────────────────────────────────
# Docker daemon needs high file descriptor limits for container management
docker  soft    nofile      524288
docker  hard    nofile      1048576

# ── Postgres ─────────────────────────────────────────────────────────────
# Postgres needs many file descriptors for concurrent connections
postgres soft   nofile      262144
postgres hard   nofile      524288
postgres soft   memlock     unlimited
postgres hard   memlock     unlimited

# ── Redis ─────────────────────────────────────────────────────────────────
# Redis benefits from locked memory for performance
redis   soft    nofile      65536
redis   hard    nofile      131072
redis   soft    memlock     unlimited
redis   hard    memlock     unlimited

# ── PM2 / Node.js ─────────────────────────────────────────────────────────
# Node.js services managed by PM2
pm2     soft    nofile      131072
pm2     hard    nofile      262144

# ── Netdata ───────────────────────────────────────────────────────────────
netdata soft    nofile      65536
netdata hard    nofile      131072
