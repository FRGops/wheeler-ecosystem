# =============================================================================
# Wheeler Enterprise — sysctl Hardening (all 3 servers)
# Applies: /etc/sysctl.d/99-wheeler-enterprise.conf
# =============================================================================

# ── Network Security ──────────────────────────────────────────────────────
# Disable IP forwarding unless explicitly needed (EDGE server needs it)
net.ipv4.ip_forward = 0
net.ipv6.conf.all.forwarding = 0

# Disable source packet routing — prevents attackers from specifying routes
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0
net.ipv6.conf.default.accept_source_route = 0

# Ignore ICMP redirects — prevents MITM via ICMP
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv6.conf.all.accept_redirects = 0
net.ipv6.conf.default.accept_redirects = 0

# Ignore ICMP bogus error responses
net.ipv4.icmp_ignore_bogus_error_responses = 1

# Enable IP spoofing protection via reverse path filtering
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# Log martian packets (impossible source addresses)
net.ipv4.conf.all.log_martians = 1
net.ipv4.conf.default.log_martians = 1

# Enable TCP SYN cookie protection — prevents SYN flood DoS
net.ipv4.tcp_syncookies = 1

# Disable ICMP echo-ignore — COREDB may want this enabled
net.ipv4.icmp_echo_ignore_all = 0

# ── TCP Stack Tuning ─────────────────────────────────────────────────────

# Increase TCP max buffer sizes for better throughput (30GB RAM servers)
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728

# Increase backlog for high-traffic services
net.core.somaxconn = 65535
net.core.netdev_max_backlog = 65535
net.ipv4.tcp_max_syn_backlog = 65535

# Enable TCP window scaling
net.ipv4.tcp_window_scaling = 1

# Enable fast recycling of TIME_WAIT sockets
net.ipv4.tcp_tw_reuse = 1

# Increase local port range (default 32768-60999 is too small for high-traffic)
net.ipv4.ip_local_port_range = 1024 65535

# TCP keepalive tuning — detect dead connections faster
net.ipv4.tcp_keepalive_time = 300
net.ipv4.tcp_keepalive_intvl = 60
net.ipv4.tcp_keepalive_probes = 5

# Enable TCP Fast Open — reduces latency for repeat connections
net.ipv4.tcp_fastopen = 3

# ── Connection Tracking (CRITICAL for Docker/Traefik servers) ─────────────

# Increase conntrack table size — Docker containers create many connections
net.netfilter.nf_conntrack_max = 2621440
net.netfilter.nf_conntrack_tcp_timeout_established = 86400
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30
net.netfilter.nf_conntrack_tcp_timeout_close_wait = 60
net.netfilter.nf_conntrack_tcp_timeout_fin_wait = 120

# ── Virtual Memory (Swap & Memory Pressure) ──────────────────────────────

# Swappiness: 10 = prefer RAM heavily, swap only when necessary
# This is ideal for databases and Docker hosts
vm.swappiness = 10

# How aggressively to cache directory entries (default 100)
# Lower values reduce memory pressure from dentry/inode caches
vm.vfs_cache_pressure = 50

# Minimum free memory to keep available (5% of 30GB = ~1.5GB)
vm.min_free_kbytes = 1572864

# Memory overcommit: 1 = allow overcommit but be reasonable
# Required for Redis and Postgres which allocate large virtual address spaces
vm.overcommit_memory = 1

# Overcommit ratio (only used when overcommit_memory = 2)
vm.overcommit_ratio = 80

# ── File System ──────────────────────────────────────────────────────────

# Maximum number of inotify watches (Docker, Tailscale, file watchers)
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 8192

# Maximum number of file handles
fs.file-max = 2097152

# Maximum number of asynchronous I/O requests (PostgreSQL needs this)
fs.aio-max-nr = 1048576

# ── Kernel Panic & OOM ───────────────────────────────────────────────────

# Auto-reboot on kernel panic after 10 seconds
kernel.panic = 10
kernel.panic_on_oops = 1

# OOM killer tuning — protect critical processes
# -1000 = never OOM kill, +1000 = first to kill
# Set via systemd service OOMScoreAdjust, not here, but document the policy:
#   sshd: -900, postgres: -800, redis: -700, docker: -500

# ── Process Limits ───────────────────────────────────────────────────────

# Maximum PID count (Docker creates many PIDs)
kernel.pid_max = 4194304

# Enable core dumps for debugging (controlled by ulimit per-process)
kernel.core_pattern = /var/crash/core.%e.%p.%t

# ── Entropy for Cryptographic Operations ─────────────────────────────────

# Use hardware RNG if available (improves TLS performance)
# kernel.randomize_va_space = 2  # default, ASLR: 2 = full randomization
