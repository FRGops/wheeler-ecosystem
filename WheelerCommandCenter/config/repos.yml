# Wheeler Ecosystem Repo Registry
# =====================================
# Populated: 2026-05-27 — all paths verified

repos:
  - name: "wheeler-brain-os"
    path: "/root"
    purpose: "Wheeler Brain OS — central intelligence and agent fleet"
    server: "hetzner"
    remote: "git@github.com:FRGops/wheeler-ecosystem.git"
    deploy_command: "cd /root && git pull && pm2 resurrect"
    smoke_command: "pm2 list | grep -c online && docker ps --format '{{.Names}}' | wc -l"
    rollback_command: "cd /root && git log --oneline -5 && echo 'Rollback: git reset --hard <commit>'"
    notes: "85 PM2 processes, 47 Docker containers — the mothership"

  - name: "wheeler-ecosystem"
    path: "/opt/wheeler-ecosystem"
    purpose: "Wheeler ecosystem intelligence and monitoring"
    server: "hetzner"
    remote: "git@github.com:Wheeler-AIOps/wheeler-ecosystem.git"
    deploy_command: "cd /opt/wheeler-ecosystem && git pull"
    smoke_command: "cd /opt/wheeler-ecosystem && git status"
    rollback_command: "cd /opt/wheeler-ecosystem && git log --oneline -5"
    notes: "Ecosystem health, repo intelligence engine"

  - name: "wheeler-revenue-automation"
    path: "/opt/wheeler-revenue-automation"
    purpose: "Revenue automation and AI workforce OS"
    server: "hetzner"
    remote: "git@github.com:Wheeler-AIOps/wheeler-revenue-automation.git"
    deploy_command: "cd /opt/wheeler-revenue-automation && git pull"
    smoke_command: "cd /opt/wheeler-revenue-automation && git status"
    rollback_command: "cd /opt/wheeler-revenue-automation && git log --oneline -5"
    notes: "Revenue engine, monetization orchestration"

  - name: "frg-site"
    path: "TODO"
    purpose: "Funds Recovery Group public website"
    server: "hostinger"
    domain: "fundsrecoverygroup.com"
    deploy_command: "ssh hostinger 'cd /opt/apps/frg-site && docker compose pull && docker compose up -d'"
    smoke_command: "curl -sI https://fundsrecoverygroup.com | head -1"
    rollback_command: "ssh hostinger 'cd /opt/apps/frg-site && docker compose down && git checkout HEAD~1 && docker compose up -d'"
    notes: "Hostinger Docker — fundsrecoverygroup.com public site"

  - name: "infisical"
    path: "/opt/infisical"
    purpose: "Agentic secrets management platform"
    server: "coredb"
    remote: "https://github.com/Infisical/infisical"
    deploy_command: "ssh coredb 'cd /opt/infisical && docker compose -f docker-compose.prod.yml up -d'"
    smoke_command: "ssh coredb 'docker ps --filter name=infisical --format {{.Status}}'"
    rollback_command: "ssh coredb 'docker compose -f /opt/infisical/docker-compose.prod.yml down && git checkout HEAD~1 && docker compose up -d'"
    notes: "Running on CoreDB — 50+ agents use it for secrets"

  - name: "prediction-radar-app"
    path: "TODO"
    purpose: "Prediction Radar OS platform"
    server: "coredb"
    domain: "predictionradar.app"
    deploy_command: "ssh coredb 'cd /opt/apps/prediction-radar-app && docker compose up -d'"
    smoke_command: "curl -sI https://predictionradar.app | head -1"
    rollback_command: "ssh coredb 'docker compose -f /opt/apps/prediction-radar-app/docker-compose.yml down && docker compose up -d'"
    notes: "Docker on CoreDB — worker+scheduler+app containers"

  - name: "frgcrm"
    path: "/opt/wheeler/apps/frgcrm"
    purpose: "FRG CRM — lead management and case tracking"
    server: "hetzner"
    deploy_command: "cd /opt/wheeler/apps/frgcrm && git pull && pm2 restart frgcrm-api frgcrm-agent-svc"
    smoke_command: "curl -s http://localhost:$(pm2 jlist | python3 -c \"import json,sys;d=json.load(sys.stdin);print([p['pm2_env']['PORT'] for p in d if p['name']=='frgcrm-api'][0])\" 2>/dev/null || echo 'TODO')/health"
    rollback_command: "cd /opt/wheeler/apps/frgcrm && git log --oneline -5"
    notes: "PM2: frgcrm-api + frgcrm-agent-svc"

  - name: "surplusai-portal"
    path: "/opt/apps/surplusai-portal"
    purpose: "SurplusAI enterprise platform API"
    server: "hetzner"
    deploy_command: "cd /opt/apps/surplusai-portal && git pull && pm2 restart surplusai-portal-api"
    smoke_command: "pm2 show surplusai-portal-api 2>/dev/null | grep status"
    rollback_command: "cd /opt/apps/surplusai-portal && git log --oneline -5"
    notes: "PM2: surplusai-portal-api (productization fleet)"

  - name: "wheeler-brain-api"
    path: "/opt/apps/wheeler-brain-api"
