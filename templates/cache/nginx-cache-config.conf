# Wheeler Nginx Cache Configuration
# Deploy to: /etc/nginx/conf.d/cache.conf on EDGE (187.77.148.88)
# Apply via: /root/templates/cache/apply-cache-strategy.sh

# ---- Cache Zone Definition ----
proxy_cache_path /var/cache/nginx/wheeler
    levels=1:2
    keys_zone=wheeler_cache:100m
    max_size=2g
    inactive=60m
    use_temp_path=off;

proxy_cache_path /var/cache/nginx/wheeler_static
    levels=1:2
    keys_zone=wheeler_static:50m
    max_size=1g
    inactive=7d
    use_temp_path=off;

# ---- Upstream Definitions with Keepalive ----
upstream aiops_backend {
    server 5.78.140.118:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
    keepalive_requests 1000;
    keepalive_timeout 60s;
}

# ---- Cache Key Defaults ----
# Include authorization header in cache key to prevent cross-user cache leaks
proxy_cache_key "$scheme$request_method$host$request_uri$http_authorization";

# ---- Cache Status Header ----
add_header X-Cache-Status $upstream_cache_status always;
add_header X-Cache-TTL "300" always;

# ---- Static Asset Cache (30 day TTL) ----
location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
    proxy_cache wheeler_static;
    proxy_cache_valid 200 30d;
    proxy_cache_valid 404 1m;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
    proxy_cache_lock on;
    proxy_cache_lock_age 5s;
    proxy_cache_lock_timeout 5s;

    proxy_pass http://aiops_backend;

    expires 30d;
    add_header Cache-Control "public, immutable";
}

# ---- API Read Cache (60s TTL) ----
location /api/ {
    # Only cache GET/HEAD requests
    set $skip_cache 0;
    if ($request_method !~ ^(GET|HEAD)$) {
        set $skip_cache 1;
    }

    proxy_cache wheeler_cache;
    proxy_cache_valid 200 60s;
    proxy_cache_valid 404 10s;
    proxy_cache_valid 301 302 10m;
    proxy_cache_bypass $skip_cache $http_cache_control;
    proxy_no_cache $skip_cache;
    proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
    proxy_cache_lock on;
    proxy_cache_lock_age 3s;
    proxy_cache_lock_timeout 3s;

    proxy_pass http://aiops_backend;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;

    # Buffering for cacheable responses
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 32k;
}

# ---- No-Cache Zone (mutations, real-time endpoints) ----
location /api/mutate/ {
    proxy_cache off;
    proxy_pass http://aiops_backend;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Host $host;
}

# ---- WebSocket Endpoints (no cache) ----
location /ws/ {
    proxy_cache off;
    proxy_pass http://aiops_backend;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}
