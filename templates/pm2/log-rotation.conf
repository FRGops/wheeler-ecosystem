###############################################################################
# Wheeler — PM2 Log Rotation Configuration
# =============================================================================
# This configuration is for the pm2-logrotate PM2 module.
#
# Installation:
#   pm2 install pm2-logrotate
#
# Apply this configuration:
#   pm2 set pm2-logrotate:<key> <value>
#
# View current configuration:
#   pm2 conf pm2-logrotate
#
# =============================================================================
# PURPOSE
# =============================================================================
# PM2 writes stdout and stderr to disk for every process it manages.  Without
# rotation, these files grow unbounded and can fill the disk.  This configuration
# rotates logs based on size and/or time, compresses old logs, and purges
# archives beyond the retention window.
#
# =============================================================================
# SIZE LIMITS
# =============================================================================

# Maximum size of a single log file before rotation is triggered.
# When a log file exceeds this size, it is rotated immediately.
# Unit: bytes, KB, MB, GB (suffix: K, M, G)
# Default: 10M
# Wheeler policy: 10M
max_size: 10M
  # 10MB per log file.  At typical Wheeler API log volume (~200 KB/min under
  # load), this triggers rotation approximately every 50 minutes.  For AI
  # workers with verbose model logs, rotation may be more frequent.
  #
  # 10M is intentionally conservative:
  #   - Rotated files stay small enough for fast grep searches.
  #   - Compression (gzip) shrinks them to ~1-2 MB each.
  #   - 30 retained files × ~2 MB compressed = ~60 MB total per service.
  #
  # If log volume spikes (debug mode, incident investigation), temporarily
  # increase to 25M to reduce rotation churn:
  #   pm2 set pm2-logrotate:max_size 25M

# =============================================================================
# RETENTION
# =============================================================================

# Number of rotated log files to keep before deletion.
# After rotation, the oldest archived log is deleted when count exceeds this.
# Default: 30
# Wheeler policy: 30
retain: 30
  # 30 rotated files.  Combined with max_size (10MB) and compression, this
  # retains at most ~300 MB of raw logs (or ~60 MB compressed) per service
  # before the oldest are purged.
  #
  # Retention strategy by environment:
  #   Production: 30  (current setting — ~1 day of logs at 10M rotation)
  #   Staging:    15  (shorter retention, less critical)
  #
  # To calculate actual retention window:
  #   window = retain * max_size / log_volume_per_day
  #   Example: 30 * 10 MB / 200 MB/day = 1.5 days

# =============================================================================
# COMPRESSION
# =============================================================================

# Whether to compress rotated log files with gzip.
# Compressed files have a .gz extension.
# Default: false
# Wheeler policy: true
compress: true
  # Compress rotated logs to save disk space.  Log files are highly
  # compressible (text, JSON) — expect 80-90% size reduction.
  # Trade-off: slightly higher CPU during rotation, but significant disk
  # savings for long retention periods.
  #
  # Verify compression is working:
  #   ls -lh ~/.pm2/logs/*.gz | head -5

# =============================================================================
# DATE FORMAT
# =============================================================================

# Set the date format for rotated log file names.
# The date is appended to the rotated file name.
# Default: YYYY-MM-DD_HH-mm-ss
# Wheeler policy: YYYY-MM-DD_HH-mm-ss (default)
dateFormat: YYYY-MM-DD_HH-mm-ss
  # Example rotated file name:
  #   wheeler-api-production-out__2026-05-23_14-30-00.log.gz

# =============================================================================
# ROTATION SCHEDULE
# =============================================================================

# Rotate logs on a time interval, regardless of file size.
# Format: [0-59] [0-23] * * *  (standard cron syntax)
# Set to false to disable time-based rotation (size-based only).
# Default: "0 0 * * *" (midnight every day)
# Wheeler policy: "0 0 * * *" (midnight daily)
rotateInterval: "0 0 * * *"
  # Rotate all logs at midnight daily.  This ensures a clean daily boundary
  # even if size-based rotation hasn't triggered.  Useful for log shippers
  # that expect daily file boundaries (Loki, Elasticsearch).
  #
  # Alternative schedules:
  #   Midnight:                "0 0 * * *"   (daily boundary, match system logrotate)
  #   Every 6 hours:           "0 */6 * * *" (quarterly, for high-volume services)
  #   Size-based only (no time): false       (rotate purely on size)

# =============================================================================
# ROTATION MODULE SETTINGS
# =============================================================================

# Enable or disable the worker interval that checks log sizes.
# When false, only time-based rotation is active.
# Default: true
rotateModule: true
  # Must be true for size-based rotation to work at all.  Only set to false
  # if you exclusively use time-based rotation (rotateInterval).

# Interval in seconds between log size checks.
# Default: 30
# Wheeler policy: 30
workerInterval: 30
  # Check log file sizes every 30 seconds.  Lower values (10-15 s) provide
  # faster rotation for high-volume services.  Higher values (60 s) reduce
  # CPU overhead from stat() calls on many log files.

# =============================================================================
# QUICK-APPLY COMMANDS
# =============================================================================
#
# Apply Wheeler production settings in one go:
#
#   pm2 set pm2-logrotate:max_size 10M
#   pm2 set pm2-logrotate:retain 30
#   pm2 set pm2-logrotate:compress true
#   pm2 set pm2-logrotate:dateFormat YYYY-MM-DD_HH-mm-ss
#   pm2 set pm2-logrotate:rotateInterval "0 0 * * *"
#   pm2 set pm2-logrotate:rotateModule true
#   pm2 set pm2-logrotate:workerInterval 30
#
# Staging settings (shorter retention, less frequent checks):
#
#   pm2 set pm2-logrotate:max_size 10M
#   pm2 set pm2-logrotate:retain 15
#   pm2 set pm2-logrotate:compress true
#   pm2 set pm2-logrotate:rotateInterval "0 0 * * *"
#   pm2 set pm2-logrotate:workerInterval 60

# =============================================================================
# VERIFICATION & MONITORING
# =============================================================================
#
# Check current logrotate configuration:
#   pm2 conf pm2-logrotate
#
# View rotated log files:
#   ls -lh ~/.pm2/logs/
#
# Check disk usage of logs:
#   du -sh ~/.pm2/logs/
#
# Manually trigger rotation (immediate — forces rotation of all logs):
#   pm2 reloadLogs
#
# Check logrotate module status:
#   pm2 list | grep logrotate
#
# Prometheus alert for log partition usage > 80%:
#   - alert: LogPartitionHigh
#     expr: (node_filesystem_avail_bytes{mountpoint="/var/log"} /
#            node_filesystem_size_bytes{mountpoint="/var/log"}) < 0.2
#     for: 5m
#     severity: warning
#     summary: "Log partition {{ $labels.mountpoint }} > 80% used"

###############################################################################
