x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── Grafana ────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: wheeler-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"       # BIND TO LOCALHOST -- was 0.0.0.0:3000
    mem_limit: 512m                  # ADDED
    cpus: "1.0"                      # ADDED
    logging: *default-logging        # ADDED (WAS NONE)
    volumes:
      - grafana_data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Prometheus ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: wheeler-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"       # BIND TO LOCALHOST -- was 0.0.0.0:9090
    mem_limit: 512m                  # ADDED
    cpus: "0.5"                      # ADDED
    logging: *default-logging        # ADDED (WAS NONE)
    volumes:
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Loki ───────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: wheeler-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"       # BIND TO LOCALHOST -- was 0.0.0.0:3100
    mem_limit: 256m                  # ADDED
    cpus: "0.5"                      # ADDED
    logging: *default-logging        # ADDED (WAS NONE)
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3100/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Uptime Kuma ────────────────────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: wheeler-uptime-kuma
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"       # BIND TO LOCALHOST -- was 0.0.0.0:3001
    mem_limit: 256m                  # ADDED
    cpus: "0.5"                      # ADDED
    logging: *default-logging        # ADDED (WAS NONE)
    volumes:
      - uptime_kuma_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  grafana_data:
  prometheus_data:
  loki_data:
  uptime_kuma_data:
