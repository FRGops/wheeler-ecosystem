###############################################################################
# Wheeler — Docker Daemon Logging Configuration
# =============================================================================
# File:      /etc/docker/daemon.json  (Docker daemon configuration)
# Purpose:   Configure Docker's logging driver, rotation, and routing for
#            all containers across all Wheeler servers.
#
# Apply:     Edit /etc/docker/daemon.json, then restart Docker:
#              sudo systemctl restart docker
#            WARNING: Restarting Docker stops all containers briefly.
#            Schedule during a maintenance window.
#
# NOTE: This file is a CONFIGURATION REFERENCE.  Copy the relevant sections
#       into /etc/docker/daemon.json.  Do NOT replace the file blindly —
#       merge with any existing daemon.json configuration.
#
###############################################################################

{
  # ===========================================================================
  # LOG DRIVER — Primary Logging Configuration
  # ===========================================================================
  #
  # Wheeler uses "json-file" as the universal log driver.  Every container
  # writes JSON-formatted logs to the host filesystem.  Promtail collects
  # these files and ships them to Loki for centralized querying.
  #
  # Alternative drivers (evaluated but not used):
  #   "loki"     — Ship directly to Loki (bypasses Promtail).
  #                Pro: Fewer moving parts.  Con: Loki outage = lost logs.
  #   "journald" — Systemd journal.  Pro: unified system logs.
  #                Con: Limited querying, no Grafana integration.
  #   "syslog"   — Traditional syslog.  Con: unstructured, hard to query.
  #   "fluentd"  — Fluentd forwarding.  Con: Additional infrastructure.
  #
  # Decision: json-file + Promtail provides:
  #   - Buffer on disk (survives Loki outages).
  #   - Structured JSON (easy to parse and query).
  #   - No additional infrastructure beyond what we already run.
  #   - Compatible with all Docker versions.

  "log-driver": "json-file",

  # ===========================================================================
  # LOG OPTIONS — Global Defaults for All Containers
  # ===========================================================================
  #
  # These options apply to ALL containers unless overridden in docker-compose
  # or docker run command.  Containers with explicit logging: blocks in
  # docker-compose override these defaults.

  "log-opts": {
    # ── Maximum Log File Size ─────────────────────────────────────────────
    "max-size": "20m",
      # Per-file size limit before rotation.  When a container's log file
      # reaches this size, Docker rotates it (renames to .1, starts new file).
      #
      # 20MB is a good default for most services.  Per-container overrides:
      #   Light logging (errors only, infrequent):  10m
      #   Normal logging (request/response):        20m
      #   Heavy logging (debug, AI, verbose):       50m
      #   Database logging (slow queries, audit):   50m
      #
      # Disk usage per service = max-size * max-file.
      # At defaults: 20MB * 3 = 60MB per service.
      # 20 services * 60MB = 1.2GB total log storage.

    # ── Maximum Number of Rotated Files ───────────────────────────────────
    "max-file": "3",
      # Number of rotated log files to keep before deleting oldest.
      #
      # 3 files * 20MB = 60MB max per service.
      # Increase to 5 for services needing local log access beyond Loki.
      # Decrease to 1 for dev/staging to save disk space.

    # ── Log Format ────────────────────────────────────────────────────────
    "mode": "non-blocking",
      # "blocking" (default): Container waits for log write to complete.
      #   Pro: Never loses log messages.
      #   Con: Slow disk I/O can block the container.
      #
      # "non-blocking": Container sends log to a ring buffer, continues
      #   immediately.  If buffer is full, oldest messages are dropped.
      #   Pro: Container never blocked by slow logging.
      #   Con: May lose log messages under extreme load.
      #
      # For Wheeler: use non-blocking for high-throughput services.
      # The ring buffer is large enough that message loss requires
      # sustained heavy logging > 10,000 lines/second.
      #
      # For critical audit services, keep blocking.

    # ── Ring Buffer Size (non-blocking mode only) ─────────────────────────
    "max-buffer-size": "4m",
      # Size of the ring buffer in non-blocking mode.
      # 4MB is sufficient for most services (approximately 40,000 log lines
      # at ~100 bytes per JSON log line).
      # Increase to 8m for very high-volume services (> 500 lines/second).

    # ── Labels for Log Tagging ────────────────────────────────────────────
    "labels": "wheeler.service,wheeler.server,wheeler.env",
      # Include these Docker labels in the log output for routing.
      # Promtail can use these labels to route logs to the correct Loki
      # streams.
      #
      # Standard Wheeler labels:
      #   wheeler.service — service name (e.g., "langflow", "ravynai-api").
      #   wheeler.server  — server name (e.g., "aiops", "edge", "coredb").
      #   wheeler.env     — environment (e.g., "production", "staging").

    # ── Environment Variables in Logs ─────────────────────────────────────
    "env": "SERVICE_NAME,NODE_ENV",
      # Include these environment variables in log entries.
      # Useful for filtering logs by service environment.
      # DO NOT include secrets (API keys, passwords, tokens).

    # ── Tag Format ────────────────────────────────────────────────────────
    "tag": "{{.Name}}/{{.ID}}",
      # Go template for the log tag.
      #   {{.Name}}     — container name (e.g., "aiops-langflow").
      #   {{.ID}}        — first 12 chars of container ID.
      #   {{.ImageName}} — image name (e.g., "langflowai/langflow:latest").
      #   {{.DaemonName}} — Docker daemon hostname.
      #
      # Alternative for Wheeler-specific routing:
      # "tag": "{{index .Config.Labels \"wheeler.service\"}}/{{.Name}}"
  },

  # ===========================================================================
  # METRICS ADDRESS — Prometheus Metrics for Docker Engine
  # ===========================================================================

  "metrics-addr": "127.0.0.1:9323",
    # Expose Docker daemon Prometheus metrics on this address.
    # Bind to 127.0.0.1 to prevent external access.
    # cAdvisor collects container metrics; this endpoint provides Docker
    # engine metrics (builds, pulls, daemon health).
    #
    # Metrics available:
    #   engine_daemon_container_actions_seconds  — container lifecycle timing.
    #   engine_daemon_health_checks_failed_total — health check failures.
    #   engine_daemon_image_actions_seconds      — image pull/build timing.

  # ===========================================================================
  # EXPERIMENTAL FEATURES (optional, evaluate before enabling)
  # ===========================================================================

  "experimental": false,
    # Keep experimental features disabled in production.

  # ===========================================================================
  # DEFAULT ULIMITS (optional — increase for high-connection services)
  # ===========================================================================

  "default-ulimits": {
    "nofile": {
      "Name": "nofile",
      "Hard": 65536,
      "Soft": 65536
    }
  }
    # Increase file descriptor limits for containers that open many
    # connections (databases, API gateways, WebSocket servers).
    # Default is 1024 which is insufficient for production databases.
}

###############################################################################
# PER-SERVICE LOGGING OVERRIDES
# =============================================================================
# In docker-compose.yml, per-service logging blocks override the daemon
# defaults.  Examples:
#
# ── High-Volume Service ─────────────────────────────────────────────────────
#   logging:
#     driver: "json-file"
#     options:
#       max-size: "50m"
#       max-file: "5"
#       mode: "non-blocking"
#       max-buffer-size: "8m"
#
# ── Low-Volume / Retention-Focused Service ──────────────────────────────────
#   logging:
#     driver: "json-file"
#     options:
#       max-size: "10m"
#       max-file: "10"        # Keep more history locally
#       mode: "blocking"      # Never lose log messages
#
# ── Audit-Trail Service (compliance) ─────────────────────────────────────────
#   logging:
#     driver: "json-file"
#     options:
#       max-size: "50m"
#       max-file: "30"        # 30 * 50MB = 1.5GB retained locally
#       mode: "blocking"      # Guaranteed delivery
#       tag: "audit/{{.Name}}"
#
###############################################################################
