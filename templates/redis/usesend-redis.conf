# ============================================================================
# Redis 7.x Optimized Configuration
# Target: EDGE / usesend-redis (UseSend Bull job queue)
# Generated: 2026-05-23
# Use case: Bull job queue with 5 queues, 52 keys, stream events growing
# ============================================================================

# ---- Memory Management ----
# Current usage: 2.92M logical, 12.12M RSS. Bull queues can grow streams.
# 256MB provides headroom for campaign-scheduler events (10K entries and growing).
maxmemory 256mb
maxmemory-policy allkeys-lru

# ---- Memory Fragmentation Mitigation ----
# Current frag ratio: 4.20 (MODERATE-HIGH).
activedefrag yes
active-defrag-ignore-bytes 10mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 50
active-defrag-cycle-min 5
active-defrag-cycle-max 75
active-defrag-max-scan-fields 1000

# Non-blocking eviction critical for Bull queue latency
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
# Also free streams lazily (Bull events use streams heavily)
lazyfree-lazy-user-del yes

# ---- Persistence ----
# RDB-only with relaxed save schedule. Bull queue recovery from RDB
# is acceptable (in-flight jobs are the minor loss window).
# NOTE: If zero job loss is required during restart, switch to appendonly yes
# with appendfsync everysec.
appendonly no
save 900 1
save 3600 10
stop-writes-on-bgsave-error no

# ---- Stream Management ----
# NOTE: The following must be done via application code or periodic cleanup:
# 1. Capping event stream MAXLEN (currently campaign-scheduler has 10,028 entries):
#    XTRIM bull:campaign-scheduler:events MAXLEN ~ 1000
#    XTRIM bull:domain-verification:events MAXLEN ~ 1000
# 2. Configuring Bull queue cleanup:
#    - removeOnComplete: { count: 100 }
#    - removeOnFail: { count: 100 }
#    - Or periodic cleanup of failed zsets
# 3. Clean up domain-verification:failed (19 entries with no TTL):
#    DEL bull:domain-verification:failed

# ---- Networking ----
timeout 0
tcp-keepalive 300
tcp-backlog 511

# ---- Client Output Buffer Limits ----
# Higher limits for Bull queue publishers
client-output-buffer-limit normal 64mb 32mb 60
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ---- Slow Log ----
# Bull evalsha calls are running 94-198ms. Set threshold above normal
# to avoid noise, but capture pathological cases.
slowlog-log-slower-than 50000
slowlog-max-len 256

# ---- Latency Monitor ----
latency-monitor-threshold 100

# ---- Lua Script Tuning ----
# Bull uses Lua scripts extensively. Ensure time limit is sufficient.
lua-time-limit 5000

# ---- General ----
daemonize no
loglevel notice
logfile ""
hz 10
rdbcompression yes
rdbchecksum yes
