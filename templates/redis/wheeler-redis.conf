# ============================================================================
# Redis 7.x Optimized Configuration
# Target: COREDB / wheeler-redis (LiteLLM token cache)
# Generated: 2026-05-23
# Use case: Ephemeral short-TTL token cache with ~8 keys, all expiring < 60s
# ============================================================================

# ---- Security ----
requirepass FRGpassword1!

# ---- Memory Management ----
# Current usage: 1.37M logical, 11.51M RSS. Set generous headroom.
maxmemory 64mb
maxmemory-policy allkeys-lru

# ---- Memory Fragmentation Mitigation ----
# Current frag ratio: 8.63 (SEVERE). Enable active defrag.
activedefrag yes
active-defrag-ignore-bytes 10mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 50
active-defrag-cycle-min 5
active-defrag-cycle-max 75
active-defrag-max-scan-fields 1000

# Non-blocking eviction (important for latency-sensitive LiteLLM)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ---- Persistence ----
# DISABLED: This is a pure ephemeral cache. All keys expire within 60s.
# AOF was writing 4.9MB for short-lived keys -- unnecessary I/O and disk usage.
appendonly no
# Disable RDB saves unless needed for warm restarts
save ""

# ---- Database Configuration ----
# Only db6 is used. Reduce to minimize startup overhead (minimal but clean).
databases 1

# ---- Networking ----
tcp-backlog 511
timeout 300
tcp-keepalive 300

# ---- Client Output Buffer Limits ----
# Protect against slow clients consuming memory
client-output-buffer-limit normal 64mb 32mb 60
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ---- Slow Log ----
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- Latency Monitor ----
latency-monitor-threshold 100

# ---- General ----
daemonize no
loglevel notice
logfile ""
hz 10
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
