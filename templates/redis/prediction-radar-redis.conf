# ============================================================================
# Redis 7.x Optimized Configuration
# Target: AIOPS / prediction-radar-app-redis (Prediction Radar cache)
# Generated: 2026-05-23
# Use case: Appears idle/dead (0 keys, 0 hit/miss). Conservative config.
# RECOMMENDATION: Remove this container if app no longer needs it.
# ============================================================================

# ---- Memory Management ----
# Current usage: 988K logical, 10.88M RSS. Minimal headroom since 0 keys.
# Docker limit is 512MB; set Redis limit well below that.
maxmemory 32mb
maxmemory-policy allkeys-lru

# ---- Memory Fragmentation Mitigation ----
# Current frag ratio: 11.71 (SEVERE - worst across all instances).
activedefrag yes
active-defrag-ignore-bytes 5mb
active-defrag-threshold-lower 5
active-defrag-threshold-upper 30
active-defrag-cycle-min 5
active-defrag-cycle-max 75
active-defrag-max-scan-fields 500

# Non-blocking eviction
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ---- Persistence ----
# DISABLED: No data exists to persist (0 keys, AOF only 88 bytes).
appendonly no
save ""

# ---- Networking ----
timeout 300
tcp-keepalive 300

# ---- Client Output Buffer Limits ----
client-output-buffer-limit normal 32mb 16mb 60
client-output-buffer-limit replica 128mb 32mb 60
client-output-buffer-limit pubsub 16mb 4mb 60

# ---- Slow Log ----
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- Latency Monitor ----
latency-monitor-threshold 100

# ---- General ----
daemonize no
loglevel notice
logfile ""
hz 10
rdbcompression yes
rdbchecksum yes
