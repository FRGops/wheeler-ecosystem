# ============================================================================
# Redis 7.x Optimized Configuration
# Target: AIOPS / docuseal-redis (DocuSeal Sidekiq job queue + stats)
# Generated: 2026-05-23
# Use case: Sidekiq job queue with dead-letter queue (1349 stale entries)
# ============================================================================

# ---- Memory Management ----
# Current usage: 2.13M logical, 9.75M RSS. Queue workloads can spike.
maxmemory 128mb
maxmemory-policy allkeys-lru

# ---- Memory Fragmentation Mitigation ----
# Current frag ratio: 4.65 (HIGH).
activedefrag yes
active-defrag-ignore-bytes 10mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 50
active-defrag-cycle-min 5
active-defrag-cycle-max 75
active-defrag-max-scan-fields 1000

# Non-blocking eviction for queue workloads
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

# ---- Persistence ----
# Queue workloads benefit from AOF for in-flight job durability.
# RDB snapshots can lose recently enqueued jobs.
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Reduce RDB save frequency for queue workloads (high write rate, low data value)
save 900 1
save 3600 10
stop-writes-on-bgsave-error no

# ---- Key Eviction / Cleanup ----
# NOTE: The following should be applied via application-level changes:
# 1. Delete the "dead" zset (1349 unrecoverable NoMethodError jobs)
#    RUN: redis-cli DEL dead
# 2. Configure Sidekiq to set TTL on dead jobs or limit dead set size
# 3. Set removeOnComplete/removeOnFail limits in Sidekiq config

# ---- Networking ----
timeout 0
tcp-keepalive 300

# ---- Client Output Buffer Limits ----
# Higher pubsub buffer for job queue patterns
client-output-buffer-limit normal 64mb 32mb 60
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# ---- Slow Log ----
slowlog-log-slower-than 10000
slowlog-max-len 128

# ---- Latency Monitor ----
latency-monitor-threshold 100

# ---- General ----
daemonize no
loglevel notice
logfile ""
hz 10
rdbcompression yes
rdbchecksum yes
