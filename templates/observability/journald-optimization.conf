# ============================================================================
# Wheeler Enterprise — journald Optimization (Drop-in snippet)
# Generated: 2026-05-23  |  Phase 11: Observability Performance Plan
# ============================================================================
# Install to: /etc/systemd/journald.conf.d/99-wheeler-optimization.conf
# Apply with:  systemctl restart systemd-journald
# Verify with: journalctl --disk-usage
# ============================================================================
# This file sets caps appropriate for ALL Wheeler servers.
# See per-server values in [Per-Server] section for exact recommendations.
# ============================================================================

[Journal]
# ── Size Caps ────────────────────────────────────────────────────────────
# Stop journald from growing unbounded. Once the cap is hit, oldest entries
# are rotated out.

SystemMaxUse=500M
RuntimeMaxUse=200M

# ── Retention ────────────────────────────────────────────────────────────
# Additionally limit by time (whichever hits first triggers rotation)

MaxRetentionSec=14d

# ── Compression ──────────────────────────────────────────────────────────
# Compress journals larger than this threshold
Compress=yes

# ── Sync Policy ──────────────────────────────────────────────────────────
# Reduce disk sync frequency to improve I/O (slight risk of losing last
# few seconds of logs on crash). Value is interval between syncs.
SyncIntervalSec=5m

# ── Rate Limiting ────────────────────────────────────────────────────────
# Prevent log flooding from runaway processes
RateLimitIntervalSec=30s
RateLimitBurst=1000

# ── Storage ──────────────────────────────────────────────────────────────
# Store journals in /var/log/journal (persistent across boots)
Storage=persistent

# ── Forwarding ────────────────────────────────────────────────────────────
# Forward to syslog for legacy compatibility (Promtail picks up both)
ForwardToSyslog=yes
ForwardToWall=no

# ============================================================================
# Per-Server Recommendations:
# ============================================================================
#
# AIOPS (current: 93.5 MB):
#   SystemMaxUse=200M  (reduce from implicit default ~4GB)
#   MaxRetentionSec=7d
#
# COREDB (current: 26.7 MB):
#   SystemMaxUse=200M
#   MaxRetentionSec=14d
#
# EDGE (current: 843.7 MB — CRITICAL):
#   SystemMaxUse=500M  (halve current usage)
#   MaxRetentionSec=7d
#   IMPORTANT: After applying, run:
#     journalctl --vacuum-size=500M
#     journalctl --vacuum-time=7d
# ============================================================================
