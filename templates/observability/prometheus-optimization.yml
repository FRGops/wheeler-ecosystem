# ============================================================================
# Wheeler Enterprise — Prometheus Optimized Configuration
# Generated: 2026-05-23  |  Phase 11: Observability Performance Plan
# Target: AIOPS (5.78.140.118)
# ============================================================================
# Changes from current config:
#   - Added retention flags (30d time, 5GB size)
#   - Removed redundant `server` label from hostinger targets
#   - Added metric_relabel_configs to drop high-cardinality label patterns
#   - Added scrape_timeout limits
#   - Added exemplar storage for trace correlation
# ============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  # ── External labels for cross-instance identification ──────────────
  external_labels:
    cluster: wheeler
    datacenter: hetzner

# ── Retention (NEW — was not configured) ──────────────────────────────
# NOTE: These are set via command-line flags, not in the config file.
# Add to Docker Compose or systemd unit:
#   --storage.tsdb.retention.time=30d
#   --storage.tsdb.retention.size=5GB
#   --storage.tsdb.wal-compression

# ── Scrape Configs ───────────────────────────────────────────────────

scrape_configs:
  # ── AIOPS Self-Scrape ──────────────────────────────────────────────
  - job_name: 'hetzner-aiops'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9090']
        labels:
          server: aiops
          datacenter: hetzner

  # ── Hostinger Node Exporter ────────────────────────────────────────
  - job_name: 'hostinger-node'
    scrape_interval: 30s
    scrape_timeout: 15s
    static_configs:
      - targets: ['100.98.163.17:9100']
        labels:
          location: hostinger
          server: srv1476866
    # Drop high-cardinality labels that don't add query value
    metric_relabel_configs:
      # Drop network interface metrics if they exceed threshold
      - source_labels: [__name__]
        regex: 'node_network_(transmit|receive)_(bytes|packets)_total'
        action: keep
      # Keep everything else by default — add drops as cardinality grows

  # ── Hostinger Services ─────────────────────────────────────────────
  - job_name: 'hostinger-services'
    scrape_interval: 30s
    scrape_timeout: 15s
    static_configs:
      - targets:
        - '100.98.163.17:8002'
        labels:
          location: hostinger
          type: agent_service

  # ── Hostinger Health Exporter ──────────────────────────────────────
  - job_name: 'hostinger-health'
    scrape_interval: 30s
    scrape_timeout: 10s
    static_configs:
      - targets:
        - 'hostinger-health-exporter:9091'
        labels:
          location: hostinger
          type: health_exporter

  # ── Docker Container Metrics (via cadvisor or prometheus exporters) ─
  # Uncomment and configure if cAdvisor or docker-engine metrics are available
  # - job_name: 'docker-containers'
  #   scrape_interval: 30s
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # ── Prometheus Self-Monitoring ─────────────────────────────────────
  - job_name: 'prometheus-self'
    scrape_interval: 30s
    static_configs:
      - targets: ['localhost:9090']

# ── Alerting Rules Placeholder ─────────────────────────────────────────
# rule_files:
#   - '/etc/prometheus/rules/*.yml'
