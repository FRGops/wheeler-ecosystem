# ============================================================================
# Wheeler Enterprise — Loki Optimized Configuration
# Generated: 2026-05-23  |  Phase 11: Observability Performance Plan
# Target: AIOPS (5.78.140.118)
# ============================================================================
# Changes from current config:
#   - Increased max_entries_limit_per_query from 5000 to 10000
#   - Added max_query_length (30d) to prevent accidental full-range scans
#   - Reduced retention from 90d to 60d (reclaim 33% storage headroom)
#   - Tuned chunk_target_size from 1.5MB to 1.0MB (faster queries, slightly more I/O)
#   - Added max_cache_freshness_per_query reduction for fresher results
#   - Added deletion_mode configuration for compactor
# ============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info
  # ── Graceful shutdown timing ──────────────────────────────────────
  graceful_shutdown_timeout: 30s
  http_server_read_timeout: 30s
  http_server_write_timeout: 30s

# ── Ingester ─────────────────────────────────────────────────────────────
ingester:
  lifecycler:
    address: 127.0.0.1
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s
  wal:
    dir: /loki/wal
  chunk_idle_period: 30m
  chunk_retain_period: 1m
  max_chunk_age: 2h
  chunk_target_size: 1048576    # 1.0MB (was 1.5MB) — smaller chunks = faster queries
  chunk_encoding: snappy
  # ── Max concurrent flushes ────────────────────────────────────────
  max_returned_stream_errors: 10
  flush_op_timeout: 10m

# ── Distributor ──────────────────────────────────────────────────────────
distributor:
  ring:
    kvstore:
      store: inmemory

# ── Schema ───────────────────────────────────────────────────────────────
schema_config:
  configs:
    - from: "2025-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: wheeler_index_
        period: 24h

# ── Storage ──────────────────────────────────────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /loki/index
    cache_location: /loki/index_cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

# ── Retention ────────────────────────────────────────────────────────────
# NOTE: Reduced from 90d to 60d. For audit logs requiring 365d,
# configure a separate Loki instance or use S3 cold storage tier.
table_manager:
  retention_deletes_enabled: true
  retention_period: 1440h  # 60 days (was 2160h / 90d)

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h       # 7 days
  max_entries_limit_per_query: 10000     # Up from 5000 — production debugging
  max_cache_freshness_per_query: 10m
  split_queries_by_interval: 30m
  max_query_length: 721h                 # ~30 days — prevent accidental full-range queries
  max_query_parallelism: 32
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  per_stream_rate_limit: 8MB
  per_stream_rate_limit_burst: 16MB
  max_global_streams_per_user: 5000
  max_chunks_per_query: 2000000
  max_label_name_length: 1024
  max_label_value_length: 2048
  max_label_names_per_series: 30
  # ── Query limits for Grafana ──────────────────────────────────────
  max_query_series: 500
  max_query_range: 721h

# ── Query Frontend ───────────────────────────────────────────────────────
query_range:
  max_retries: 3
  parallelise_shardable_queries: true
  align_queries_with_step: true
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 256

# ── Compactor ────────────────────────────────────────────────────────────
compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem
  deletion_mode: filter-and-delete   # NEW — enables selective log deletion

# ── Ruler (Alerting from logs) ───────────────────────────────────────────
ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-temp
  alertmanager_url: http://alertmanager:9093
  ring:
    kvstore:
      store: inmemory
  enable_api: true
  enable_sharding: false
  evaluation_interval: 1m
  poll_interval: 10m

# ── Analytics ────────────────────────────────────────────────────────────
analytics:
  reporting_enabled: false

# ── Tracing ──────────────────────────────────────────────────────────────
# Enable if distributed tracing is adopted later
# tracing:
#   enabled: false
