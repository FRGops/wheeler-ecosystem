# ============================================================================
# Wheeler Enterprise — Grafana Optimized Configuration (override snippet)
# Generated: 2026-05-23  |  Phase 11: Observability Performance Plan
# Target: AIOPS (5.78.140.118)
# ============================================================================
# This is a partial .ini override. Merge into your existing grafana.ini or
# mount as /etc/grafana/grafana.ini in the container.
# ============================================================================

# ── Database (SQLite tuning) ─────────────────────────────────────────────
[database]
# SQLite is default. For production with >10 users, migrate to PostgreSQL.
# max_open_conns = 0 means unlimited — improves dashboard load times.
max_open_conns = 0
# Cache dashboard definitions for faster repeated loads
cache_mode = normal

# ── Security ─────────────────────────────────────────────────────────────
[security]
# Disable user sign-up (enterprise deployment)
disable_initial_admin_creation = false
# Set a minimum; actual complexity enforced by org policy
min_password_length = 12
# Disable Gravatar to prevent external image requests
disable_gravatar = true
# Cookie security
cookie_secure = true
cookie_samesite = strict
# Prevent embedding in iframes (clickjacking protection)
x_content_type_options = true
x_xss_protection = true
content_security_policy = true

# ── Alerting ─────────────────────────────────────────────────────────────
[alerting]
enabled = true
# Use reasonable retry window — avoid alert storms after transient failures
max_attempts = 3
min_interval = 30s
# Evaluation timeout for alert rules
evaluation_timeout = 30s
# Notification timeout to avoid blocking the scheduler
notification_timeout = 30s

# ── Unified Alerting (Grafana 8+) ────────────────────────────────────────
[unified_alerting]
enabled = true
# Keep alert state history for 120 hours (5 days) for post-mortems
execute_alerts = true
evaluation_timeout = 30s
max_attempts = 3
min_interval = 30s
# State history backend — requires SQL or Postgres
# If using default SQLite, keep reasonable retention
admin_config_poll_interval = 60s

# ── Analytics ────────────────────────────────────────────────────────────
[analytics]
reporting_enabled = false
check_for_updates = false
# Disable telemetry
feedback_links_enabled = false

# ── Dashboards ───────────────────────────────────────────────────────────
[dashboards]
# Default home dashboard for the org
default_home_dashboard_path = /var/lib/grafana/dashboards/home.json
# Auto-assign minimum viewer role
min_refresh_interval = 5s

# ── Rendering ────────────────────────────────────────────────────────────
[rendering]
# Disable server-side rendering if not using PDF/PNG exports
server_side_png_rendering = false
# If needed, use a separate renderer container
# renderer_url = http://grafana-image-renderer:8081/render

# ── Query History ────────────────────────────────────────────────────────
[query_history]
enabled = true

# ── Dataproxy ────────────────────────────────────────────────────────────
[dataproxy]
timeout = 60
# Limit response size to prevent memory exhaustion from large queries
send_user_header = false
# Idle connection pooling
keep_alive_seconds = 30
max_idle_connections = 100
idle_conn_timeout_seconds = 90

# ── Logging ──────────────────────────────────────────────────────────────
[log]
mode = console
level = info
# Reduce log spam from successful queries

# ── Metrics (Grafana's own internal metrics) ─────────────────────────────
[metrics]
enabled = true
# Expose Grafana's own Prometheus metrics on :3000/metrics
basic_auth_username = grafana_internal
basic_auth_password = ${GRAFANA_METRICS_PASSWORD:-changeme}

# ── Snapshot ─────────────────────────────────────────────────────────────
[snapshots]
# Disable public snapshot sharing
external_enabled = false

# ── Panels ───────────────────────────────────────────────────────────────
[panels]
# Disable unsupported panel types to reduce attack surface
disable_sanitize_html = false

# ── Feature Toggles ──────────────────────────────────────────────────────
[feature_toggles]
# Enable useful features without the bloat
enable = accessControlOnCall,alertingSimplifiedRouting

# ── Date Formats ─────────────────────────────────────────────────────────
[date_formats]
# Consistent ISO format across the org
full_date = YYYY-MM-DD HH:mm:ss
interval_second = HH:mm:ss
interval_minute = HH:mm
interval_hour = MM/DD HH:mm
interval_day = MM/DD
interval_month = YYYY-MM
interval_year = YYYY
