# ============================================================================
# Wheeler Enterprise — Application Log Rotation Configuration
# Generated: 2026-05-23  |  Phase 11: Observability Performance Plan
# Target: EDGE (187.77.148.88) — also suitable for AIOPS adaption
# ============================================================================
# Install to: /etc/logrotate.d/wheeler-apps
# Test with:   logrotate -d /etc/logrotate.d/wheeler-apps
# Force with:  logrotate -f /etc/logrotate.d/wheeler-apps
# ============================================================================

# ── SurplusAI Application ────────────────────────────────────────────────
/var/log/surplusai.log {
    daily
    rotate 14          # Keep 14 days of history
    missingok
    notifempty
    compress           # gzip old logs, save 60-80% space
    delaycompress      # Keep yesterday's log uncompressed for 1 day
    sharedscripts
    postrotate
        # Signal the app to re-open log file (adjust PID file path as needed)
        /usr/bin/pkill -HUP -f surplusai 2>/dev/null || true
    endscript
    maxsize 100M       # Force rotation if >100MB even before daily
    dateext            # Use date suffix: surplusai.log-20260523.gz
    dateformat -%Y%m%d
}

# ── FRG CRM Application ──────────────────────────────────────────────────
/var/log/frgcrm.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        /usr/bin/pkill -HUP -f frgcrm 2>/dev/null || true
    endscript
    maxsize 100M
    dateext
    dateformat -%Y%m%d
}

# ── Canary Monitoring ────────────────────────────────────────────────────
/var/log/canary.log
/var/log/canary/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    maxsize 100M
    dateext
    dateformat -%Y%m%d
}

# ── PM2 Logs ─────────────────────────────────────────────────────────────
# Handled by pm2-logrotate module if installed.
# This is a fallback if pm2-logrotate is not used.
/root/.pm2/logs/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate       # PM2 keeps pipes open — copytruncate avoids SIGPIPE
    maxsize 50M
    dateext
    dateformat -%Y%m%d
}

# ── Nginx Logs (if on EDGE/AIOPS) ────────────────────────────────────────
/var/log/nginx/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        [ -f /var/run/nginx.pid ] && kill -USR1 $(cat /var/run/nginx.pid) 2>/dev/null || true
    endscript
    maxsize 100M
    dateext
    dateformat -%Y%m%d
}

# ── Traefik Logs (if on EDGE/AIOPS) ──────────────────────────────────────
/var/log/traefik/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        docker kill --signal=USR1 traefik 2>/dev/null || true
    endscript
    maxsize 100M
    dateext
    dateformat -%Y%m%d
}

# ── System Logs (syslog, auth, kern) ─────────────────────────────────────
# These are usually configured in /etc/logrotate.d/rsyslog already.
# This is an override to tighten retention.
/var/log/syslog
/var/log/auth.log
/var/log/kern.log
/var/log/ufw.log
/var/log/messages {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        /usr/bin/pkill -HUP rsyslogd 2>/dev/null || true
    endscript
    maxsize 50M
    dateext
    dateformat -%Y%m%d
}

# ── Docker Container Logs ────────────────────────────────────────────────
# Docker's built-in log rotation (json-file driver).
# This is an external rotation for containers without the driver configured.
/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
    maxsize 50M
    dateext
    dateformat -%Y%m%d
}
