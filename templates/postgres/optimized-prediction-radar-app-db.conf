# =============================================================================
# OPTIMIZED PostgreSQL Configuration (Full Retune)
# Instance: prediction-radar-app-db
# Server:   AIOPS (5.78.140.118)
# Version:  PostgreSQL 16.13
# Host RAM: 30 GB (shared with 2 other PG instances, 2 GB allocated here)
# Generated: 2026-05-23
#
# STATUS PRIOR TO TUNING: 100% stock PostgreSQL 16 defaults.
# 128 MB shared_buffers, 4 MB work_mem, random_page_cost=4 (HDD defaults).
# Critical: 5 connections in "idle in transaction" state (transaction leak).
# 490+ unused indexes, 20+ tables with sequential scans.
# =============================================================================

# ---- Memory ----
# 15% of 30 GB host RAM, largest allocation among 3 PG instances (most data)
shared_buffers = 2GB
effective_cache_size = 6GB
work_mem = 32MB
maintenance_work_mem = 512MB
wal_buffers = 16MB
huge_pages = try

# ---- Connections ----
# Reduced from 100. Only 8 observed, 5 stuck in idle-in-transaction.
max_connections = 50
superuser_reserved_connections = 3

# ---- Worker Processes ----
max_worker_processes = 8
max_parallel_workers_per_gather = 4           # Bumped from 2
max_parallel_workers = 8
max_parallel_maintenance_workers = 2
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

# ---- WAL ----
wal_level = replica
wal_compression = on                           # NEW: Reduce WAL I/O (130+ tables = high WAL volume)
max_wal_size = 4GB                             # Bumped from 1GB
min_wal_size = 1GB                             # Bumped from 80MB
wal_keep_size = 0
checkpoint_timeout = 15min                     # Bumped from 5min -- reduce I/O spikes
checkpoint_completion_target = 0.9

# ---- Planner ----
random_page_cost = 1.1                         # CRITICAL: Was 4.0 (HDD default). SSD = 1.1
effective_io_concurrency = 200                 # CRITICAL: Was 1 (HDD default). SSD = 200
default_statistics_target = 200                # Bumped from 100 (130+ table schema needs better stats)
seq_page_cost = 1.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# ---- Background Writer ----
bgwriter_delay = 100ms                         # Bumped from 200ms
bgwriter_lru_maxpages = 400                    # Bumped from 100
bgwriter_flush_after = 512kB

# ---- Autovacuum ----
autovacuum = on
autovacuum_vacuum_scale_factor = 0.1           # Trigger vacuum sooner (was 0.2)
autovacuum_analyze_scale_factor = 0.05         # Analyze more often (was 0.1)
autovacuum_max_workers = 3
autovacuum_naptime = 30s                       # Check more often (was 1min)
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# ---- Client Connection Defaults ----
# CRITICAL: Was 0 (disabled). 5 connections currently stuck in idle-in-transaction.
# This will terminate abandoned transactions after 5 minutes.
idle_in_transaction_session_timeout = 300000

statement_timeout = 30000                      # 30s max query time
lock_timeout = 10000                           # 10s max lock wait
log_min_duration_statement = 1000              # Log queries > 1s (was -1 = off)
log_autovacuum_min_duration = 0
log_checkpoints = on
log_lock_waits = on
log_temp_files = 32MB
log_connections = on
log_disconnections = on

# ---- Extensions / Libraries ----
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000                 # 130+ tables, many query patterns

# ---- I/O ----
track_io_timing = on                           # NEW: Required for I/O timing in pg_stat_statements
track_functions = pl
track_activity_query_size = 4096

# ---- Synchronous Commit ----
synchronous_commit = on
wal_sync_method = fdatasync
