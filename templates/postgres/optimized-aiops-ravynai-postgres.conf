# =============================================================================
# OPTIMIZED PostgreSQL Configuration (Full Retune)
# Instance: aiops-ravynai-postgres
# Server:   AIOPS (5.78.140.118)
# Version:  PostgreSQL 16.4 (OLD -- upgrade to 16.14 recommended)
# Host RAM: 30 GB (shared with 2 other PG instances, 1 GB allocated here)
# Extensions: PostGIS (tiger, topology schemas)
# Generated: 2026-05-23
#
# STATUS PRIOR TO TUNING: 100% stock PostgreSQL 16 defaults.
# 128 MB shared_buffers, 4 MB work_mem, random_page_cost=4 (HDD defaults).
# =============================================================================

# ---- Memory ----
# Modest allocation: PostGIS queries benefit from more, but 3 containers on host
shared_buffers = 1GB
effective_cache_size = 6GB
work_mem = 32MB
maintenance_work_mem = 512MB              # PostGIS index maintenance needs more
wal_buffers = 16MB
huge_pages = try

# ---- Connections ----
max_connections = 50
superuser_reserved_connections = 3

# ---- Worker Processes ----
max_worker_processes = 8
max_parallel_workers_per_gather = 4       # PostGIS spatial queries benefit from parallelism
max_parallel_workers = 8
max_parallel_maintenance_workers = 2
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

# ---- WAL ----
wal_level = replica
wal_compression = on                       # Reduce WAL I/O (PostGIS indexes = large WAL)
max_wal_size = 4GB
min_wal_size = 1GB
wal_keep_size = 0
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9

# ---- Planner ----
random_page_cost = 1.1                     # CRITICAL: Was 4.0 (HDD default). SSD.
effective_io_concurrency = 200             # CRITICAL: Was 1. SSD = 200
default_statistics_target = 200            # PostGIS spatial queries need better stats
seq_page_cost = 1.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# ---- Background Writer ----
bgwriter_delay = 100ms
bgwriter_lru_maxpages = 400
bgwriter_flush_after = 512kB

# ---- Autovacuum ----
autovacuum = on
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# ---- Client Connection Defaults ----
idle_in_transaction_session_timeout = 300000
statement_timeout = 30000                  # 30s -- geospatial queries may need more; adjust if needed
lock_timeout = 10000
log_min_duration_statement = 1000
log_autovacuum_min_duration = 0
log_checkpoints = on
log_lock_waits = on
log_temp_files = 32MB
log_connections = on
log_disconnections = on

# ---- Extensions / Libraries ----
shared_preload_libraries = 'pg_stat_statements,postgis-3'
pg_stat_statements.track = all
pg_stat_statements.max = 5000

# ---- I/O ----
track_io_timing = on
track_functions = pl
track_activity_query_size = 4096

# ---- Synchronous Commit ----
synchronous_commit = on
wal_sync_method = fdatasync
