# =============================================================================
# OPTIMIZED PostgreSQL Configuration (Minor Tuning)
# Instance: frgops-standby
# Server:   AIOPS (5.78.140.118)
# Version:  PostgreSQL 16.14 (Alpine)
# Host RAM: 30 GB (shared with 2 other PG instances, 4 GB total PG budget)
# Generated: 2026-05-23
#
# NOTE: This instance was already well-tuned. Only minor adjustments applied.
# =============================================================================

# ---- Memory ----
# Kept at current 1 GB (already correct for 3-container host)
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 32MB
maintenance_work_mem = 512MB          # Bumped from 256MB
wal_buffers = 16MB                    # Kept at current generous value
huge_pages = try

# ---- Connections ----
max_connections = 100
superuser_reserved_connections = 3

# ---- Worker Processes ----
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_parallel_maintenance_workers = 4

# ---- WAL ----
wal_level = replica
wal_compression = on                   # NEW: Reduce WAL I/O
max_wal_size = 4GB                     # Kept
min_wal_size = 1GB                     # Kept
wal_keep_size = 0
checkpoint_timeout = 15min             # Bumped from 5min
checkpoint_completion_target = 0.9

# ---- Planner ----
random_page_cost = 1.1                 # Already SSD-optimized
effective_io_concurrency = 200         # Already SSD-optimized
default_statistics_target = 100        # Kept (small schema)
seq_page_cost = 1.0
cpu_tuple_cost = 0.01
cpu_index_tuple_cost = 0.005
cpu_operator_cost = 0.0025

# ---- Background Writer ----
bgwriter_delay = 100ms                 # Bumped from 200ms default
bgwriter_lru_maxpages = 400            # Bumped from 100 default
bgwriter_flush_after = 512kB

# ---- Autovacuum ----
autovacuum = on
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 200

# ---- Client Connection Defaults ----
idle_in_transaction_session_timeout = 300000   # NEW: Kill abandoned txns
statement_timeout = 0                           # Kept (no timeout for replication traffic)
lock_timeout = 10000
log_min_duration_statement = 1000               # NEW: Log slow queries
log_autovacuum_min_duration = 0
log_checkpoints = on
log_lock_waits = on
log_temp_files = 32MB

# ---- Extensions / Libraries ----
shared_preload_libraries = 'pg_stat_statements'  # NEW
pg_stat_statements.track = all
pg_stat_statements.max = 5000

# ---- I/O ----
track_io_timing = on                             # NEW
track_functions = pl
track_activity_query_size = 4096

# ---- Replication (standby-specific) ----
hot_standby = on
max_wal_senders = 10
max_replication_slots = 10
wal_sender_timeout = 60s
synchronous_commit = on
