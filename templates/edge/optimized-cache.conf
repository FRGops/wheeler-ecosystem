# =============================================================================
# CACHE ZONES — Defined in http block of nginx.conf
# =============================================================================

# ---- Static Asset Cache (1 GB) ----
# For: /_next/static, /static, /assets, /fonts, /images
# TTL: 60 minutes inactive, 1GB max storage
# proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:50m max_size=1g inactive=60m use_temp_path=off;

# ---- API Read Cache (500 MB) ----
# For: GET requests to read-heavy API endpoints
# TTL: 10 minutes inactive, 500MB max
# proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:50m max_size=500m inactive=10m use_temp_path=off;

# ---- FRGCRM Dashboard Cache (100 MB, existing) ----
# For: FRGCRM /api/ dashboard endpoints
# Already declared in current nginx.conf — preserved.
# proxy_cache_path /var/cache/nginx/frgcrm levels=1:2 keys_zone=frgcrm_dashboard:10m max_size=100m inactive=5m use_temp_path=off;

