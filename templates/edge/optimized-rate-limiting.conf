# =============================================================================
# EDGE Server — Optimized Rate Limiting Configuration
# Target: /etc/nginx/conf.d/rate-limiting-optimized.conf (included from nginx.conf)
# Generated: 2026-05-23
#
# Currently only 3/25 sites have rate limiting with a single zone (brainos: 30r/s).
# This configuration provides tiered rate limiting for all traffic profiles.
# =============================================================================

# =============================================================================
# RATE LIMIT ZONES (defined in nginx.conf http block)
# =============================================================================

# ---- Auth Zone: 10 requests per MINUTE per IP ----
# For: /login, /api/auth/login, /api/auth/*
# Memory: ~64 bytes per 10k IPs = ~640KB
# limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# ---- API Zone: 60 requests per SECOND per IP ----
# For: General API endpoints
# Memory: ~64 bytes per 100k IPs = ~6.4MB
# limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;

# ---- Generic Zone: 100 requests per SECOND per IP ----
# For: Default traffic on all vhosts
# Memory: ~64 bytes per 100k IPs = ~6.4MB
# limit_req_zone $binary_remote_addr zone=generic:10m rate=100r/s;

# ---- Marketing Zone: 200 requests per SECOND per IP ----
# For: Public marketing sites (high burst expected)
# Memory: ~64 bytes per 100k IPs = ~6.4MB
# limit_req_zone $binary_remote_addr zone=marketing:10m rate=200r/s;

# ---- Connection Limiting: 20 concurrent per IP ----
# limit_conn_zone $binary_remote_addr zone=connperip:10m;

# =============================================================================
# USAGE PATTERNS (apply in vhost location blocks)
# =============================================================================

# ---- Pattern 1: Auth/Login Endpoints (STRICT) ----
# Apply to: POST /login, POST /api/auth/login, POST /admin/auth/login
#
#   location /api/auth/ {
#       limit_req zone=auth burst=5 nodelay;
#       limit_req_status 429;
#       # ... proxy_pass ...
#   }

# ---- Pattern 2: API Endpoints (MODERATE) ----
# Apply to: All /api/ locations
#
#   location /api/ {
#       limit_req zone=api burst=50 nodelay;
#       limit_req_status 429;
#       # ... proxy_pass ...
#   }

# ---- Pattern 3: General Traffic (GENEROUS) ----
# Apply to: Default server block location /
#
#   location / {
#       limit_req zone=generic burst=100 nodelay;
#       limit_req_status 429;
#       limit_conn connperip 20;
#       # ... proxy_pass ...
#   }

# ---- Pattern 4: Marketing/Static Sites (HIGH VOLUME) ----
# Apply to: fundsrecoverygroup.com, getsurplus.ai, surplusai.io
#
#   location / {
#       limit_req zone=marketing burst=200 nodelay;
#       limit_req_status 429;
#       limit_conn connperip 30;
#       # ... proxy_pass ...
#   }

# ---- Pattern 5: TTS/Voice Webhooks (MODERATE) ----
# Apply to: /tts/, /twiml/ (Twilio webhooks)
#
#   location /twiml/ {
#       limit_req zone=api burst=20 nodelay;
#       limit_req_status 429;
#       # ... proxy_pass ...
#   }

# ---- Pattern 6: Health Check Endpoints (NO LIMIT) ----
# Apply to: /api/health, /healthz, /ping
#
#   location /api/health {
#       limit_req zone=generic burst=10 nodelay;
#       access_log off;
#       # ... proxy_pass ...
#   }

# =============================================================================
# BURST QUEUE BEHAVIOR
# =============================================================================
#
# nodelay:    Excess requests are rejected immediately (return 429)
# delay=5:    First 5 excess requests queue with delay, rest rejected
# (no nodelay): All burst requests queue with delay (not recommended for API)
#
# Recommendation: Use nodelay for API/auth, delay for static sites.
#
# Example with delay (allows some queuing):
#   limit_req zone=marketing burst=200 delay=50;
#   # First 50 over rate → queued with delay
#   # Next 150 over rate → rejected immediately
# =============================================================================

# =============================================================================
# DRY-RUN MODE (test without blocking)
# =============================================================================
# Set $limit_req_dryrun to bypass rate limiting for testing:
#
#   map $http_x_ratelimit_bypass $limit_req_dryrun {
#       default 0;
#       "test-key-12345" 1;
#   }
#
# Then add conditional:
#   location /api/ {
#       set $limit_req_zone api;
#       if ($limit_req_dryrun = 0) {
#           limit_req zone=api burst=50 nodelay;
#       }
#   }

# =============================================================================
# RATE LIMIT RESPONSE
# =============================================================================
# Custom 429 response:
#
#   error_page 429 /ratelimit.json;
#   location = /ratelimit.json {
#       internal;
#       default_type application/json;
#       return 429 '{"error":"Too Many Requests","retry_after":30}';
#       add_header Retry-After 30 always;
#   }
#
# Or simple:
#   limit_req_status 429;

