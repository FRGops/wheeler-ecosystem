# =============================================================================
# EDGE Server — Optimized Proxy Configuration
# Target: /etc/nginx/conf.d/proxy-optimized.conf (included from nginx.conf)
# Generated: 2026-05-23
#
# Centralizes proxy settings that should be consistent across all
# reverse-proxied backends. Individual vhosts can override as needed.
# =============================================================================

# ---- Connection Timeouts ----
proxy_connect_timeout 30s;        # Time to establish connection to backend
proxy_read_timeout 60s;           # Time to read response from backend (override for long-poll: 300s)
proxy_send_timeout 30s;           # Time to send request to backend

# ---- Buffer Settings ----
# Larger buffers reduce disk I/O for proxied responses.
# 16k buffers can hold most API responses in memory.
proxy_buffer_size 16k;            # Buffer for response headers
proxy_buffers 32 16k;             # 32 buffers of 16KB each = 512KB max
proxy_busy_buffers_size 32k;      # Buffer size while sending to client
proxy_temp_file_write_size 32k;   # Write chunk size when buffering to disk

# ---- Proxy Headers (defaults for all proxied requests) ----
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;

# ---- Connection Handling ----
proxy_http_version 1.1;
proxy_set_header Connection "";          # Clear Connection header (allow keepalive)

# ---- Error Handling ----
proxy_intercept_errors off;              # Let backend error pages pass through
proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
proxy_next_upstream_tries 2;              # Try next backend once, then give up
proxy_next_upstream_timeout 10s;          # Max time to try next upstream

# ---- Caching Defaults ----
proxy_cache_bypass $http_upgrade;         # Don't cache WebSocket upgrades
proxy_cache_revalidate on;                # Conditional GET with If-Modified-Since
proxy_cache_min_uses 3;                   # Cache after 3 requests (prevent one-off cache pollution)

# =============================================================================
# PER-SITE OVERRIDE EXAMPLES:
#
# Long-polling / SSE (e.g., Wheeler War Room, voice-agent):
#   proxy_read_timeout 300s;
#   proxy_buffering off;              # Disable buffering for streaming
#   proxy_cache off;
#
# WebSocket (e.g., Next.js HMR, real-time dashboards):
#   proxy_http_version 1.1;
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection "upgrade";
#   proxy_read_timeout 3600s;         # 1 hour for WebSocket
#
# API with caching (e.g., FRGCRM dashboard):
#   proxy_cache frgcrm_dashboard;
#   proxy_cache_valid 200 30s;
#   proxy_cache_valid 404 1m;
#   proxy_cache_use_stale error timeout updating;
#   add_header X-Cache-Status $upstream_cache_status;
#
# File upload (e.g., usesend storage):
#   client_max_body_size 100m;
#   proxy_read_timeout 300s;
#   proxy_request_buffering off;      # Stream upload to backend
# =============================================================================
