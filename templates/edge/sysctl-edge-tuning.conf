# =============================================================================
# EDGE Server — Kernel Network Tuning
# Target: /etc/sysctl.d/99-edge-tuning.conf
# Apply:  sysctl -p /etc/sysctl.d/99-edge-tuning.conf
# Generated: 2026-05-23
#
# These settings optimize Linux kernel networking for a high-traffic
# reverse proxy / web server.
# =============================================================================

# ---- Connection Queue Tuning ----
# Increase the maximum number of connections in the SYN backlog queue.
# Default: 4096. Recommended: 65535 for high-traffic proxy.
net.core.somaxconn = 65535

# Maximum number of packets in the receive queue.
# Default: 1000. Recommended: 5000+ for high-traffic.
net.core.netdev_max_backlog = 5000

# Maximum SYN backlog. Default: 2048. Recommended: 8192 for proxy.
net.ipv4.tcp_max_syn_backlog = 8192

# ---- Connection Handling ----
# Enable fast recycling of TIME_WAIT sockets.
# 0=disable, 1=enable for all, 2=enable for loopback only.
# Already 2 (good). Keep it.
net.ipv4.tcp_tw_reuse = 2

# Reduce TIME_WAIT timeout from default 60s to 15s.
# Faster connection recycling under high connection churn.
net.ipv4.tcp_fin_timeout = 15

# ---- TCP Keepalive ----
# Start keepalive probes after 5 minutes of idle (default 2 hours!)
net.ipv4.tcp_keepalive_time = 300

# Interval between keepalive probes: 60 seconds
net.ipv4.tcp_keepalive_intvl = 60

# Number of keepalive probes before declaring connection dead
net.ipv4.tcp_keepalive_probes = 5

# ---- TCP Performance ----
# Disable slow start after idle. Critical for HTTP/1.1 keepalive connections
# that sit idle between requests. Without this, every request after idle
# triggers a slow start ramp-up, hurting latency.
# Default: 1 (enabled). Set to 0 (disabled).
net.ipv4.tcp_slow_start_after_idle = 0

# Enable TCP Fast Open. Allows data in the SYN packet, eliminating one
# round trip for repeat connections. 3 = enable for client and server.
# 1 = client only. 3 = both. Already set to 1. Set to 3.
net.ipv4.tcp_fastopen = 3

# Enable MTU probing. Helps avoid PMTUD black holes on some networks.
net.ipv4.tcp_mtu_probing = 1

# ---- TCP Buffer Sizes ----
# Increase max socket buffer sizes for better throughput on high-BDP links.
# 128 MB max receive buffer
net.core.rmem_max = 134217728

# 128 MB max send buffer
net.core.wmem_max = 134217728

# Auto-tuning buffer ranges (min, default, max):
# Receive: 4KB min, 87KB default, 128MB max
net.ipv4.tcp_rmem = 4096 87380 134217728

# Send: 4KB min, 65KB default, 128MB max
net.ipv4.tcp_wmem = 4096 65536 134217728

# Enable TCP window scaling (default on, make explicit)
net.ipv4.tcp_window_scaling = 1

# ---- Connection Tracking (for iptables/nftables) ----
# Increase connection tracking table size (useful if using iptables)
# Default: calculated from memory. 1M entries.
net.netfilter.nf_conntrack_max = 1048576

# Reduce connection tracking timeout for established connections
# Default: 432000 (5 days!). Reduce to 1 hour for HTTP.
net.netfilter.nf_conntrack_tcp_timeout_established = 3600

# ---- IPv6 (if used) ----
# Same optimizations for IPv6
net.ipv6.conf.all.forwarding = 1
net.ipv6.conf.default.forwarding = 1

# ---- Local Port Range ----
# Expand ephemeral port range for outgoing connections (nginx to backends)
# Default: 32768-60999 (~28k ports). Expand to 10k-65k (~55k ports).
net.ipv4.ip_local_port_range = 10000 65535

# ---- TCP Congestion Control ----
# BBR provides better throughput and lower latency than CUBIC on modern kernels.
# Requires kernel 4.9+. This server runs 6.8.0 — fully supported.
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# =============================================================================
# VERIFICATION COMMANDS
# =============================================================================
#
# Apply:
#   sysctl -p /etc/sysctl.d/99-edge-tuning.conf
#
# Verify individual settings:
#   sysctl net.core.somaxconn
#   sysctl net.ipv4.tcp_congestion_control
#
# Check BBR is active:
#   sysctl net.ipv4.tcp_congestion_control
#   # Should output: net.ipv4.tcp_congestion_control = bbr
#
# Check connection tracking:
#   cat /proc/sys/net/netfilter/nf_conntrack_max
#   cat /proc/sys/net/netfilter/nf_conntrack_count
# =============================================================================
