# =============================================================================
# EDGE Server Optimized nginx.conf
# Generated: 2026-05-23
# Target: EDGE @ 187.77.148.88 (8 cores, 31GB RAM)
# Replaces: /etc/nginx/nginx.conf
#
# KEY CHANGES:
#   - worker_connections: 768 -> 4096 (6,144 -> 32,768 max concurrent)
#   - Added worker_rlimit_nofile 16384
#   - multi_accept enabled
#   - Consolidated SSL session cache (1 zone vs 20)
#   - Global gzip with all types enabled
#   - proxy_buffer tuning
#   - 4 rate limit zones (auth, api, generic, marketing)
#   - keepalive_timeout reduced
#   - OCSP stapling enabled
#   - open_file_cache enabled
# =============================================================================

user www-data;
worker_processes auto;
worker_rlimit_nofile 16384;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# Load dynamic modules
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {

    ##
    # Rate Limiting Zones
    ##
    # Auth/login endpoints: strict (10 req/min per IP)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # API endpoints: moderate (60 req/s per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;

    # General traffic: generous (100 req/s per IP)
    limit_req_zone $binary_remote_addr zone=generic:10m rate=100r/s;

    # Marketing/static sites: high volume (200 req/s per IP)
    limit_req_zone $binary_remote_addr zone=marketing:10m rate=200r/s;

    # Legacy zone (existing vhost references: wheeler-frgops-io, wheeler-bypass)
    limit_req_zone $binary_remote_addr zone=brainos:10m rate=30r/s;

    # Connection limiting (per-IP)
    limit_conn_zone $binary_remote_addr zone=connperip:10m;

    ##
    # Basic Settings
    ##

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    types_hash_max_size 2048;
    server_tokens off;
    server_names_hash_bucket_size 128;

    # Timeouts
    keepalive_timeout 30s;
    keepalive_requests 2000;
    client_body_timeout 12s;
    client_header_timeout 12s;
    send_timeout 10s;

    # Body/buffer sizes
    client_max_body_size 10m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL, Gzip, Proxy, Resolver, Security — delegated to conf.d/*
    # See optimized-global-ssl.conf, optimized-gzip.conf, optimized-proxy.conf
    ##

    ##
    # Logging Settings
    ##
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log /var/log/nginx/error.log warn;

    ##
    # Open File Cache
    ##
    open_file_cache max=10000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    ##
    # Proxy Caches
    ##
    # FRGCRM Dashboard cache (existing, preserved)
    proxy_cache_path /var/cache/nginx/frgcrm
        levels=1:2
        keys_zone=frgcrm_dashboard:10m
        max_size=100m
        inactive=5m
        use_temp_path=off;

    # Static asset cache — shared across all vhosts
    proxy_cache_path /var/cache/nginx/static
        levels=1:2
        keys_zone=static_cache:50m
        max_size=1g
        inactive=60m
        use_temp_path=off;

    # API read cache — for read-heavy endpoints
    proxy_cache_path /var/cache/nginx/api
        levels=1:2
        keys_zone=api_cache:50m
        max_size=500m
        inactive=10m
        use_temp_path=off;

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}

# =============================================================================
