#
# 1. REMOVE ssl_session_cache from ALL vhosts — now global SSL:40m
# 2. REMOVE ssl_session_timeout from ALL vhosts — now global 10m
# 3. REMOVE ssl_protocols from vhosts — now global TLSv1.2 TLSv1.3
# 4. REMOVE ssl_ciphers from vhosts — now global, client-preferred
# 5. REMOVE ssl_prefer_server_ciphers off from vhosts — now global
# 6. REMOVE gzip settings from wheeler-frgops-io — now global
