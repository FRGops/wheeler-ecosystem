# =============================================================================
# EDGE Server — Optimized Compression Configuration
# Target: /etc/nginx/conf.d/gzip-optimized.conf (included from nginx.conf)
# Generated: 2026-05-23
#
# Replaces the broken global config where gzip was ON but ALL types
# and settings were commented out, meaning only text/html was compressed.
# =============================================================================

# ---- Gzip ----
gzip on;
gzip_vary on;                    # Add Vary: Accept-Encoding header
gzip_proxied any;                # Compress ALL proxied responses
gzip_comp_level 5;               # Balance CPU (1-9): 5 = 75% size reduction, moderate CPU
gzip_min_length 256;             # Don't compress tiny responses (header overhead > savings)
gzip_buffers 16 8k;              # 16 buffers of 8KB each
gzip_http_version 1.1;           # Only compress for HTTP/1.1+ clients
gzip_disable "msie6";            # IE6 has broken gzip support

# ---- Content Types to Compress ----
gzip_types
    # Text
    text/plain
    text/css
    text/xml
    text/javascript
    text/csv
    text/markdown

    # Application
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/rss+xml
    application/atom+xml
    application/xhtml+xml
    application/ld+json
    application/manifest+json
    application/schema+json
    application/vnd.api+json

    # Fonts
    font/woff
    font/woff2
    application/x-font-ttf
    application/x-font-opentype
    application/vnd.ms-fontobject
    font/ttf
    font/otf

    # Images
    image/svg+xml
    image/x-icon
    image/bmp;

# ---- Brotli (if module installed) ----
# Install: apt-get install nginx-module-brotli (or libnginx-mod-http-brotli-filter)
# Then load in nginx.conf:
#   load_module modules/ngx_http_brotli_filter_module.so;
#   load_module modules/ngx_http_brotli_static_module.so;

# brotli on;
# brotli_comp_level 6;            # 6 = sweet spot for brotli (max 11)
# brotli_static on;               # Serve pre-compressed .br files if they exist
# brotli_types
#     text/plain text/css text/xml text/javascript
#     application/json application/javascript application/xml application/xml+rss
#     application/rss+xml application/atom+xml
#     image/svg+xml font/woff font/woff2
#     application/x-font-ttf application/x-font-opentype
#     application/vnd.ms-fontobject;

# =============================================================================
# COMPRESSION SAVINGS ESTIMATE (per asset type):
#
# Content Type          Raw Size   Gzip Level 5   Brotli Level 6
# ----------------------------------------------------------------
# HTML                  100 KB     18-22 KB        16-19 KB
# CSS                   100 KB     17-20 KB        15-17 KB
# JavaScript            100 KB     22-28 KB        19-24 KB
# JSON API Response     100 KB     12-16 KB        10-14 KB
# SVG                   100 KB     20-30 KB        18-25 KB
# WOFF2                 100 KB     Already compressed (skip)
#
# For a typical SPA page load:
#   Without compression: 2.5 MB
#   With gzip level 5:   ~600 KB  (76% reduction)
#   With Brotli level 6: ~500 KB  (80% reduction)
# =============================================================================
