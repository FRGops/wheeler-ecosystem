# =============================================================================
# DEFAULT SERVER — Drop requests with unknown Host headers
# =============================================================================
# Prevents random IP scans and bots from hitting the server.
# Add to nginx.conf or a conf.d file BEFORE other server blocks.
#
# server {
#     listen 80 default_server;
#     listen [::]:80 default_server;
#     listen 443 ssl http2 default_server;
#     listen [::]:443 ssl http2 default_server;
#
#     ssl_certificate /etc/nginx/ssl/default.crt;
#     ssl_certificate_key /etc/nginx/ssl/default.key;
#
#     server_name _;
#
#     # Drop connection silently (no response to scanners)
#     return 444;
# }

# =============================================================================
# REQUEST METHOD RESTRICTION (per vhost)
# =============================================================================
# Block dangerous HTTP methods globally or per vhost:
#
#   if ($request_method !~ ^(GET|HEAD|POST|PUT|PATCH|DELETE|OPTIONS)$) {
#       return 444;
#   }
#
# Already configured on wheeler-frgops-io and fundsrecoverygroup.com.
# Recommend adding to ALL vhosts.

# =============================================================================
