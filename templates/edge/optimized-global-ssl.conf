# =============================================================================
# EDGE Server — Optimized SSL Configuration
# Target: /etc/nginx/conf.d/ssl-optimized.conf (included from nginx.conf)
# Generated: 2026-05-23
#
# This file centralizes SSL settings that are currently duplicated across
# 25+ vhosts. Include it ONCE in nginx.conf (http block) and remove
# per-vhost SSL directives.
# =============================================================================

# ---- Protocol Versions ----
# TLSv1.2 minimum, TLSv1.3 preferred (no SSLv3, no TLSv1, no TLSv1.1)
ssl_protocols TLSv1.2 TLSv1.3;

# ---- Cipher Selection ----
# Let the client choose the fastest shared cipher.
# Modern browsers all support AES-GCM or ChaCha20-Poly1305.
ssl_prefer_server_ciphers off;

# ---- Cipher Suites (explicit, modern-only) ----
# Ordered by preference: ECDHE first, then DHE fallback.
# NO: CBC-mode ciphers, RC4, 3DES, EXPORT, MD5, SHA1
ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

# ---- ECDH Curve ----
# X25519 is fastest, P-256 as fallback
ssl_ecdh_curve X25519:secp384r1:prime256v1;

# ---- Session Cache ----
# Single shared 40MB cache for ALL vhosts.
# Replaces 20+ separate 10MB zones (was wasting ~200MB).
# 40MB can hold ~100,000 sessions.
ssl_session_cache shared:SSL:40m;
ssl_session_timeout 10m;

# ---- Session Tickets ----
# Disabled: session cache is sufficient. Tickets rotate keys across
# nginx reloads, which can cause issues with pinned certificates.
ssl_session_tickets off;

# ---- OCSP Stapling ----
# Eliminates client-side OCSP lookup during TLS handshake.
# Nginx fetches and caches the OCSP response, attaches it to the
# certificate during handshake. This saves ~30-50% of handshake time.
ssl_stapling on;
ssl_stapling_verify on;
ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;

# DNS resolver for OCSP stapling lookups
resolver 8.8.8.8 8.8.4.4 valid=300s;
resolver_timeout 5s;

# ---- DH Parameters ----
# Must be 2048-bit minimum. Regenerate if current file is corrupt:
#   openssl dhparam -out /etc/nginx/dhparam.pem 2048
ssl_dhparam /etc/nginx/dhparam.pem;

# ---- Buffer Sizes for SSL ----
ssl_buffer_size 8k;

# ---- Security Headers (globally) ----
# HSTS: 1 year, include subdomains, preload list eligible
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent clickjacking
add_header X-Frame-Options "SAMEORIGIN" always;

# XSS filter for older browsers
add_header X-XSS-Protection "1; mode=block" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions: deny all sensitive browser features by default
add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

# =============================================================================
# VHOST MIGRATION: Remove these directives from ALL vhost server blocks:
#
#   ssl_certificate / ssl_certificate_key    — KEEP per-vhost (different certs)
#   ssl_session_cache                        — REMOVE (now global SSL:40m)
#   ssl_session_timeout                      — REMOVE (now global 10m)
#   ssl_protocols                            — REMOVE (now global)
#   ssl_ciphers                              — REMOVE (now global)
#   ssl_prefer_server_ciphers                — REMOVE (now global)
#   ssl_stapling / ssl_stapling_verify       — REMOVE (add globally above)
#   Security add_header directives           — REMOVE (now global above)
#
#   RETAIN per-vhost:
#   ssl_certificate                          — REQUIRED (unique per domain)
#   ssl_certificate_key                      — REQUIRED (unique per domain)
#   CSP (Content-Security-Policy)            — MAY be vhost-specific
# =============================================================================
