model_list:
- model_name: deepseek-chat
  litellm_params:
    model: openai/deepseek-chat
    api_key: os.environ/DEEPSEEK_API_KEY
    api_base: https://api.deepseek.com
    rpm: 1000
    timeout: 45
    num_retries: 2
- model_name: deepseek-v4-pro
  litellm_params:
    model: openai/deepseek-chat
    api_key: os.environ/DEEPSEEK_API_KEY
    api_base: https://api.deepseek.com
    rpm: 500
    timeout: 90
    num_retries: 2
- model_name: premium_review
  litellm_params:
    model: anthropic/claude-sonnet-4-20250514
    api_key: os.environ/DEEPSEEK_API_KEY
    api_base: https://api.deepseek.com/anthropic
    rpm: 100
    timeout: 90
    num_retries: 1
- model_name: claude-sonnet-4
  litellm_params:
    model: anthropic/claude-sonnet-4-20250514
    api_key: os.environ/DEEPSEEK_API_KEY
    api_base: https://api.deepseek.com/anthropic
    rpm: 100
    timeout: 90
    num_retries: 1
- model_name: claude-opus-4
  litellm_params:
    model: anthropic/claude-opus-4-20250514
    api_key: os.environ/DEEPSEEK_API_KEY
    api_base: https://api.deepseek.com/anthropic
    rpm: 50
    timeout: 120
    num_retries: 1

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  redis_host: "127.0.0.1"
  redis_port: "6379"
  public_routes:
    - "/health"
    - "/health/liveliness"
    - "/health/readiness"

litellm_settings:
  request_timeout: 45
  num_retries: 2
  cache: true
  cache_params:
    type: redis
    host: "127.0.0.1"
    port: "6379"
  drop_params: true
  set_verbose: false
  fallbacks:
    - deepseek-chat: ["claude-sonnet-4"]
    - deepseek-v4-pro: ["deepseek-chat"]
    - premium_review: ["claude-sonnet-4"]
    - claude-sonnet-4: ["deepseek-chat"]
    - claude-opus-4: ["claude-sonnet-4"]
  routing_strategy: "usage-based-routing"
  max_parallel_requests: 20
