services:
  infisical:
    image: infisical/infisical:latest
    container_name: infisical
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:8089:8080"
    networks:
      - wheeler-core_default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/status"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    cpus: 1.0
    cap_drop:
      - ALL

  nginx:
    image: nginx:alpine
    container_name: infisical-nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:8443:80"
    networks:
      - wheeler-core_default
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

networks:
  wheeler-core_default:
    external: true
