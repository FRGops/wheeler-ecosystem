# =============================================================================
# Repo Router - AI Ops Nginx Route Template
# Source: templates/nginx/route-aiops.conf
# Description: Reverse proxy route for AI Ops services with localhost binds,
#              rate limiting, and basic authentication.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones shared across AI Ops routes
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=aiops_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=aiops_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=aiops_webhook:10m rate=60r/m;

# ---------------------------------------------------------------------------
# Auth basic file for AI Ops services
# ---------------------------------------------------------------------------
# Generate with: htpasswd -c /etc/nginx/.aiops-auth admin
# Stored on AI Ops node only (never pushed to git)

# ---------------------------------------------------------------------------
# Surplus AI Portal - main entry
# ---------------------------------------------------------------------------
server {
    listen 127.0.0.1:80;
    server_name surplusai.localhost;

    access_log /var/log/nginx/aiops-surplusai-access.log;
    error_log  /var/log/nginx/aiops-surplusai-error.log;

    location / {
        proxy_pass http://127.0.0.1:3600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        limit_req zone=aiops_api burst=10 nodelay;
    }

    location /api {
        proxy_pass http://127.0.0.1:3600;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=aiops_api burst=20 nodelay;

        # Only allow specific HTTP methods
        limit_except GET POST PUT DELETE PATCH {
            deny all;
        }
    }

    location /health {
        proxy_pass http://127.0.0.1:3600/health;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}

# ---------------------------------------------------------------------------
# Private AI - internal LLM gateway (with auth)
# ---------------------------------------------------------------------------
server {
    listen 127.0.0.1:80;
    server_name private-ai.localhost;

    access_log /var/log/nginx/aiops-private-ai-access.log;
    error_log  /var/log/nginx/aiops-private-ai-error.log;

    auth_basic "Private AI - Authorized Access Only";
    auth_basic_user_file /etc/nginx/.aiops-auth;

    location / {
        proxy_pass http://127.0.0.1:3700;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 30s;

        limit_req zone=aiops_api burst=5 nodelay;
    }
}

# ---------------------------------------------------------------------------
# Prediction Radar - with API key validation
# ---------------------------------------------------------------------------
server {
    listen 127.0.0.1:80;
    server_name prediction-radar.localhost;

    access_log /var/log/nginx/aiops-prediction-radar-access.log;
    error_log  /var/log/nginx/aiops-prediction-radar-error.log;

    location / {
        proxy_pass http://127.0.0.1:3800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        limit_req zone=aiops_api burst=15 nodelay;
    }

    location /api/v1/predict {
        limit_req zone=aiops_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:3800;
    }
}

# ---------------------------------------------------------------------------
# OpenClaw Dashboard
# ---------------------------------------------------------------------------
server {
    listen 127.0.0.1:80;
    server_name openclaw.localhost;

    access_log /var/log/nginx/aiops-openclaw-access.log;
    error_log  /var/log/nginx/aiops-openclaw-error.log;

    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=aiops_api burst=10 nodelay;
    }

    location /health {
        proxy_pass http://127.0.0.1:3400/health;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
