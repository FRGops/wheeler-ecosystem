# =============================================================================
# Repo Router - Hostinger Nginx Route Template
# Source: templates/nginx/route-hostinger.conf
# Description: Reverse proxy route for Hostinger services with remote proxy,
#              SSH tunnel awareness, and rate limiting.
# =============================================================================

# ---------------------------------------------------------------------------
# Rate limiting zones for Hostinger routes
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=hostinger_api:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=hostinger_crm:10m rate=40r/m;

# ---------------------------------------------------------------------------
# Global Hostinger upstream blocks (SSH tunnel endpoints)
# ---------------------------------------------------------------------------
upstream frgcrm_api_upstream {
    server 127.0.0.1:3301 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream frgcrm_frontend_upstream {
    server 127.0.0.1:3300 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

# ---------------------------------------------------------------------------
# FRGCRM Frontend
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name frgcrm.hostinger.local;

    access_log /var/log/nginx/hostinger-frgcrm-access.log;
    error_log  /var/log/nginx/hostinger-frgcrm-error.log;

    location / {
        proxy_pass http://frgcrm_frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        limit_req zone=hostinger_crm burst=20 nodelay;
    }

    location /static/ {
        proxy_pass http://frgcrm_frontend_upstream;
        proxy_cache_valid 200 1h;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}

# ---------------------------------------------------------------------------
# FRGCRM API
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name frgcrm-api.hostinger.local;

    access_log /var/log/nginx/hostinger-frgcrm-api-access.log;
    error_log  /var/log/nginx/hostinger-frgcrm-api-error.log;

    location / {
        proxy_pass http://frgcrm_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        limit_req zone=hostinger_api burst=15 nodelay;
    }

    location /health {
        proxy_pass http://frgcrm_api_upstream/health;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location /metrics {
        proxy_pass http://frgcrm_api_upstream/metrics;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}

# ---------------------------------------------------------------------------
# Wheeler Revenue Automation
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name revenue-automation.hostinger.local;

    access_log /var/log/nginx/hostinger-revenue-access.log;
    error_log  /var/log/nginx/hostinger-revenue-error.log;

    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;

        limit_req zone=hostinger_api burst=10 nodelay;
    }

    location /webhook {
        proxy_pass http://127.0.0.1:3501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        limit_req zone=hostinger_api burst=5 nodelay;
    }

    location /cron {
        proxy_pass http://127.0.0.1:3502;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        allow 127.0.0.1;
        deny all;
    }
}

# ---------------------------------------------------------------------------
# Hostinger Legacy Admin (locked down - internal only)
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name admin.hostinger.local;

    access_log /var/log/nginx/hostinger-admin-access.log;
    error_log  /var/log/nginx/hostinger-admin-error.log;

    auth_basic "Hostinger Admin - Authorized Access Only";
    auth_basic_user_file /etc/nginx/.hostinger-admin-auth;

    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        limit_req zone=hostinger_api burst=5 nodelay;

        # Admin panels must only be accessible via tailnet
        allow 100.64.0.0/10;
        allow 127.0.0.1;
        deny all;
    }
}
