# =============================================================================
# Repo Router - Tailscale Nginx Route Template
# Source: templates/nginx/route-tailscale.conf
# Description: Tailscale-aware reverse proxy route template with tailnet ACL
#              awareness, MagicDNS resolution, and zero-trust access controls.
# =============================================================================

# ---------------------------------------------------------------------------
# Tailscale subnet allowlist
# ---------------------------------------------------------------------------
# Tailscale IPv4 range (CGNAT)
geo $tailscale_allow {
    default 0;
    100.64.0.0/10 1;
    127.0.0.0/8   1;
}

# ---------------------------------------------------------------------------
# Upstream definitions using MagicDNS names (resolved via tailnet)
# ---------------------------------------------------------------------------
upstream tailscale_aiops {
    server aiops-node.tailnet-abc123.ts.net:80 max_fails=2 fail_timeout=30s;
    keepalive 8;
}

upstream tailscale_coredb {
    server coredb-node.tailnet-abc123.ts.net:80 max_fails=2 fail_timeout=30s;
    keepalive 8;
}

# ---------------------------------------------------------------------------
# Tailscale API Gateway - central entry point
# ---------------------------------------------------------------------------
server {
    listen 8443 ssl http2;
    server_name router.tailnet.private;

    ssl_certificate     /etc/nginx/ssl/tailscale.crt;
    ssl_certificate_key /etc/nginx/ssl/tailscale.key;
    ssl_protocols       TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/tailscale-gateway-access.log;
    error_log  /var/log/nginx/tailscale-gateway-error.log;

    # Enforce Tailscale-only access
    if ($tailscale_allow = 0) {
        return 403 "Access restricted to tailnet only";
    }

    # AI Ops route via Tailscale
    location /aiops/ {
        proxy_pass http://tailscale_aiops/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tailscale-Userid $http_tailscale_user;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limit: 100 requests per minute via tailnet
        limit_req zone=tailscale_aiops:10m rate=100r/m burst=20;
    }

    # Core DB route via Tailscale
    location /coredb/ {
        proxy_pass http://tailscale_coredb/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tailscale-Userid $http_tailscale_user;

        proxy_http_version 1.1;

        limit_req zone=tailscale_coredb:10m rate=60r/m burst=10;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}

# ---------------------------------------------------------------------------
# Tailscale internal service mesh - direct pod-to-pod
# ---------------------------------------------------------------------------
server {
    listen 8080;
    server_name mesh.tailnet.internal;

    access_log /var/log/nginx/tailscale-mesh-access.log;
    error_log  /var/log/nginx/tailscale-mesh-error.log;

    # Only allow tailscale IPs
    allow 100.64.0.0/10;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:${MESH_PORT:-8000};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Tailscale-Userid $http_tailscale_user;

        proxy_http_version 1.1;

        # Short timeouts for mesh - this is internal
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}

# ---------------------------------------------------------------------------
# Tailscale metrics endpoint (scraped by Prometheus on tailnet)
# ---------------------------------------------------------------------------
server {
    listen 9090;
    server_name metrics.tailnet.internal;

    access_log off;

    allow 100.64.0.0/10;
    allow 127.0.0.1;
    deny all;

    location / {
        proxy_pass http://127.0.0.1:9100;
        proxy_set_header Host $host;
    }

    location /prometheus {
        proxy_pass http://127.0.0.1:9090;
    }
}
