# =============================================================================
# Repo Router - Reusable Resource Limits Fragment
# Source: templates/fragments/resources.yml
# Description: Resource limit profiles for dev, staging, and production
#              environments. Merge into service definitions as needed.
# =============================================================================

# ---------------------------------------------------------------------------
# Profile selector - set RESOURCE_PROFILE=dev|staging|prod
# ---------------------------------------------------------------------------
x-profile: &profile ${RESOURCE_PROFILE:-prod}

# =============================================================================
# DEVELOPMENT PROFILES (local dev, minimal resources)
# =============================================================================
x-dev-base: &dev-base
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: "256M"

x-dev-cpu-heavy: &dev-cpu-heavy
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: "512M"

x-dev-db: &dev-db
  deploy:
    resources:
      limits:
        cpus: "0.5"
        memory: "512M"

x-dev-agent: &dev-agent
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: "4G"

# =============================================================================
# STAGING PROFILES (integration testing, moderate resources)
# =============================================================================
x-staging-base: &staging-base
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: "512M"
      reservations:
        cpus: "0.25"
        memory: "128M"

x-staging-cpu-heavy: &staging-cpu-heavy
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: "1G"
      reservations:
        cpus: "0.5"
        memory: "256M"

x-staging-db: &staging-db
  deploy:
    resources:
      limits:
        cpus: "1.0"
        memory: "1G"
      reservations:
        cpus: "0.25"
        memory: "256M"

x-staging-agent: &staging-agent
  deploy:
    resources:
      limits:
        cpus: "4.0"
        memory: "8G"
      reservations:
        cpus: "1.0"
        memory: "2G"

# =============================================================================
# PRODUCTION PROFILES (full resources, production workloads)
# =============================================================================
x-prod-base: &prod-base
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: "1G"
      reservations:
        cpus: "0.5"
        memory: "256M"

x-prod-cpu-heavy: &prod-cpu-heavy
  deploy:
    resources:
      limits:
        cpus: "4.0"
        memory: "2G"
      reservations:
        cpus: "1.0"
        memory: "512M"

x-prod-db: &prod-db
  deploy:
    resources:
      limits:
        cpus: "4.0"
        memory: "4G"
      reservations:
        cpus: "1.0"
        memory: "1G"

x-prod-agent: &prod-agent
  deploy:
    resources:
      limits:
        cpus: "8.0"
        memory: "32G"
      reservations:
        cpus: "2.0"
        memory: "8G"

# =============================================================================
# RESOLVER - maps RESOURCE_PROFILE to the correct resource block
# Use by adding to your service: <<: *resolve-${RESOURCE_PROFILE:-prod}-base
# =============================================================================
# Examples:
#
# services:
#   web:
#     <<: *web-resources
#
#   db:
#     <<: *db-resources
#
#   worker:
#     <<: *worker-resources

x-web-resources: &web-resources
  deploy:
    resources:
      limits:
        cpus: "${WEB_CPU_LIMIT:-2.0}"
        memory: "${WEB_MEM_LIMIT:-1G}"
      reservations:
        cpus: "${WEB_CPU_RESERVE:-0.5}"
        memory: "${WEB_MEM_RESERVE:-256M}"

x-db-resources: &db-resources
  deploy:
    resources:
      limits:
        cpus: "${DB_CPU_LIMIT:-4.0}"
        memory: "${DB_MEM_LIMIT:-4G}"
      reservations:
        cpus: "${DB_CPU_RESERVE:-1.0}"
        memory: "${DB_MEM_RESERVE:-1G}"

x-worker-resources: &worker-resources
  deploy:
    resources:
      limits:
        cpus: "${WORKER_CPU_LIMIT:-2.0}"
        memory: "${WORKER_MEM_LIMIT:-1G}"
      reservations:
        cpus: "${WORKER_CPU_RESERVE:-0.5}"
        memory: "${WORKER_MEM_RESERVE:-256M}"

x-agent-resources: &agent-resources
  deploy:
    resources:
      limits:
        cpus: "${AGENT_CPU_LIMIT:-8.0}"
        memory: "${AGENT_MEM_LIMIT:-32G}"
      reservations:
        cpus: "${AGENT_CPU_RESERVE:-2.0}"
        memory: "${AGENT_MEM_RESERVE:-8G}"

x-cache-resources: &cache-resources
  deploy:
    resources:
      limits:
        cpus: "${CACHE_CPU_LIMIT:-1.0}"
        memory: "${CACHE_MEM_LIMIT:-512M}"
      reservations:
        cpus: "${CACHE_CPU_RESERVE:-0.25}"
        memory: "${CACHE_MEM_RESERVE:-128M}"

# =============================================================================
# GPU device reservation template (for AI agent services)
# =============================================================================
x-gpu-reservation: &gpu-reservation
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: ${GPU_COUNT:-1}
            capabilities: [gpu]
