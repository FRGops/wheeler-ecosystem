# =============================================================================
# Repo Router - Reusable Healthcheck Fragment
# Source: templates/fragments/healthcheck.yml
# Description: Reusable healthcheck configurations for different service types.
#              Merge into service definitions with yq or compose merge.
#
# Usage:
#   yq eval-all 'select(fileIndex == 0) * select(fileIndex == 1)' \
#     docker-compose.yml fragments/healthcheck.yml
# =============================================================================

# ---------------------------------------------------------------------------
# HTTP healthcheck (Node.js, Python, Go services)
# ---------------------------------------------------------------------------
x-healthcheck-http: &healthcheck-http
  healthcheck:
    test: ["CMD", "curl", "--fail", "--silent", "http://localhost:${PORT:-8000}/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 20s

# ---------------------------------------------------------------------------
# HTTP healthcheck using wget (for Alpine-based images without curl)
# ---------------------------------------------------------------------------
x-healthcheck-wget: &healthcheck-wget
  healthcheck:
    test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3000}/health"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 15s

# ---------------------------------------------------------------------------
# TCP port healthcheck (generic - checks if port is open)
# ---------------------------------------------------------------------------
x-healthcheck-tcp: &healthcheck-tcp
  healthcheck:
    test: ["CMD", "nc", "-z", "localhost", "${PORT:-8000}"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 10s

# ---------------------------------------------------------------------------
# PostgreSQL healthcheck
# ---------------------------------------------------------------------------
x-healthcheck-postgres: &healthcheck-postgres
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app} && pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app} -q || exit 1"
      ]
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 30s

# ---------------------------------------------------------------------------
# Redis healthcheck
# ---------------------------------------------------------------------------
x-healthcheck-redis: &healthcheck-redis
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 10s

# ---------------------------------------------------------------------------
# Nginx configuration test healthcheck
# ---------------------------------------------------------------------------
x-healthcheck-nginx: &healthcheck-nginx
  healthcheck:
    test: ["CMD", "nginx", "-t"]
    interval: 60s
    timeout: 5s
    retries: 2
    start_period: 5s

# ---------------------------------------------------------------------------
# AI Model healthcheck (longer start period for model loading)
# ---------------------------------------------------------------------------
x-healthcheck-model: &healthcheck-model
  healthcheck:
    test: ["CMD", "curl", "--fail", "--silent", "http://localhost:${PORT:-8000}/v1/health"]
    interval: 30s
    timeout: 15s
    retries: 5
    start_period: 120s

# ---------------------------------------------------------------------------
# Custom command healthcheck (for arbitrary checks)
# ---------------------------------------------------------------------------
x-healthcheck-custom: &healthcheck-custom
  healthcheck:
    test: ${HEALTHCHECK_COMMAND:-["CMD-SHELL", "exit 0"]}
    interval: ${HEALTHCHECK_INTERVAL:-30s}
    timeout: ${HEALTHCHECK_TIMEOUT:-10s}
    retries: ${HEALTHCHECK_RETRIES:-3}
    start_period: ${HEALTHCHECK_START_PERIOD:-15s}

# ---------------------------------------------------------------------------
# Usage example - add to any service:
#
# services:
#   my-service:
#     <<: *healthcheck-http
#     # OR
#     <<: *healthcheck-postgres
#     # OR override specific values:
#     healthcheck:
#       <<: *healthcheck-http
#       interval: 10s  # override
# =============================================================================
