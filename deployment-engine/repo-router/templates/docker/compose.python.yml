# =============================================================================
# Repo Router - Python/FastAPI Docker Compose Template
# Source: templates/docker/compose.python.yml
# Description: Production Python FastAPI service with healthcheck, resource
#              limits, and internal network isolation.
# =============================================================================

version: "3.8"

x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    image: ${IMAGE_TAG:-python:3.11-slim}
    container_name: ${CONTAINER_NAME:-python-service}
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-Dockerfile}
      args:
        PYTHON_ENV: ${PYTHON_ENV:-production}
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PORT:-8000}:${PORT:-8000}"
    environment:
      PYTHON_ENV: ${PYTHON_ENV:-production}
      PORT: ${PORT:-8000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKERS: ${WORKERS:-4}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-app}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      SECRET_KEY: ${SECRET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEM_LIMIT:-1G}"
        reservations:
          cpus: "${CPU_RESERVE:-0.5}"
          memory: "${MEM_RESERVE:-256M}"
    networks:
      - internal
      - monitoring
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=128M
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  celery_worker:
    image: ${IMAGE_TAG:-python:3.11-slim}
    container_name: ${CONTAINER_NAME:-python-service}-worker
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    command: celery -A app.tasks worker --loglevel=${LOG_LEVEL:-info} --concurrency=${CELERY_CONCURRENCY:-4}
    environment:
      PYTHON_ENV: ${PYTHON_ENV:-production}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-app}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
    volumes:
      - app_data:/app/data
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-2.0}"
          memory: "${MEM_LIMIT:-1G}"
    networks:
      - internal
    logging: *default-logging

volumes:
  app_data:
    driver: local
  app_logs:
    driver: local

networks:
  internal:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    external: false
