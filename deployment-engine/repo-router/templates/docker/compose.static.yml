# =============================================================================
# Repo Router - Static Site / Nginx Docker Compose Template
# Source: templates/docker/compose.static.yml
# Description: Nginx static site with SSL termination, caching, and monitoring.
# =============================================================================

version: "3.8"

x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${CONTAINER_NAME:-static-site}
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${HTTP_PORT:-80}:80"
      - "${BIND_ADDRESS:-127.0.0.1}:${HTTPS_PORT:-443}:443"
    environment:
      NGINX_HOST: ${DOMAIN_NAME:-localhost}
      NGINX_PORT: ${HTTP_PORT:-80}
    volumes:
      - ./public:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/snippets:/etc/nginx/snippets:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 60s
      timeout: 5s
      retries: 2
    deploy:
      resources:
        limits:
          cpus: "${CPU_LIMIT:-0.5}"
          memory: "${MEM_LIMIT:-128M}"
        reservations:
          cpus: "${CPU_RESERVE:-0.1}"
          memory: "${MEM_RESERVE:-64M}"
    networks:
      - web
      - monitoring
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=32M
      - /var/cache/nginx:size=128M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  certbot:
    image: certbot/certbot:latest
    container_name: ${CONTAINER_NAME:-static-site}-certbot
    restart: unless-stopped
    entrypoint: ""
    command: >
      sh -c "trap exit TERM; while :; do
        certbot renew --webroot -w /var/www/html --quiet
        sleep 43200
      done"
    volumes:
      - ./public:/var/www/html:ro
      - ./ssl:/etc/letsencrypt:rw
      - certbot_logs:/var/log/letsencrypt
    deploy:
      resources:
        limits:
          memory: "${CERTBOT_MEM_LIMIT:-128M}"
    networks:
      - web
    logging: *default-logging

volumes:
  nginx_logs:
    driver: local
  certbot_logs:
    driver: local

networks:
  web:
    driver: bridge
  monitoring:
    driver: bridge
    external: false
