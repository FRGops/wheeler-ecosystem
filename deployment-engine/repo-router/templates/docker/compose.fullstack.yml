# =============================================================================
# Repo Router - Fullstack Docker Compose Template
# Source: templates/docker/compose.fullstack.yml
# Description: Frontend (React/Vue) + Backend (Node/Python) + Database + Redis
# =============================================================================

version: "3.8"

x-logging:
  &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    image: ${FRONTEND_IMAGE:-node:20-alpine}
    container_name: ${CONTAINER_NAME:-fullstack}-frontend
    build:
      context: ${FRONTEND_CONTEXT:-./frontend}
      dockerfile: ${FRONTEND_DOCKERFILE:-Dockerfile}
      args:
        API_URL: ${API_URL:-http://backend:8000}
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${FRONTEND_PORT:-3000}
      API_URL: ${API_URL:-http://backend:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${FRONTEND_PORT:-3000}/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${FRONTEND_CPU_LIMIT:-0.5}"
          memory: "${FRONTEND_MEM_LIMIT:-256M}"
    networks:
      - frontend
      - monitoring
    logging: *default-logging
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  backend:
    image: ${BACKEND_IMAGE:-python:3.11-slim}
    container_name: ${CONTAINER_NAME:-fullstack}-backend
    build:
      context: ${BACKEND_CONTEXT:-./backend}
      dockerfile: ${BACKEND_DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${BACKEND_PORT:-8000}:${BACKEND_PORT:-8000}"
    environment:
      PYTHON_ENV: ${NODE_ENV:-production}
      PORT: ${BACKEND_PORT:-8000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-app}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_NAME: ${DB_NAME:-app}
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - backend_data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:${BACKEND_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "${BACKEND_CPU_LIMIT:-2.0}"
          memory: "${BACKEND_MEM_LIMIT:-1G}"
    networks:
      - frontend
      - backend
      - monitoring
    logging: *default-logging
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

  db:
    image: postgres:16-alpine
    container_name: ${CONTAINER_NAME:-fullstack}-db
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=peer"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app}"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "${DB_CPU_LIMIT:-1.0}"
          memory: "${DB_MEM_LIMIT:-1G}"
    networks:
      - backend
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID

  redis:
    image: redis:7-alpine
    container_name: ${CONTAINER_NAME:-fullstack}-redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: "${REDIS_MEM_LIMIT:-256M}"
    networks:
      - backend
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
      - DAC_OVERRIDE

volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local
  redis_data:
    driver: local

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    external: false
