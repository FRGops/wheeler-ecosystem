# =============================================================================
# Repo Router - Loki Log Aggregation Config Template
# Source: templates/monitoring/loki-config.yml
# Description: Loki configuration for centralized log aggregation across all
#              Wheeler ecosystem nodes (AI Ops, Hostinger, Core DB).
# =============================================================================

auth_enabled: ${LOKI_AUTH_ENABLED:-false}

server:
  http_listen_port: ${LOKI_HTTP_PORT:-3100}
  grpc_listen_port: ${LOKI_GRPC_PORT:-9095}
  http_server_read_timeout: 30s
  http_server_write_timeout: 30s
  log_level: ${LOKI_LOG_LEVEL:-info}

ingester:
  lifecycler:
    ring:
      kvstore:
        store: ${LOKI_RING_STORE:-inmemory}
      replication_factor: 1
    heartbeat_period: 5s
  chunk_idle_period: 30m
  chunk_block_size: 262144
  chunk_retain_period: 1m
  chunk_target_size: 1572864
  max_transfer_retries: 0
  wal:
    dir: /var/loki/wal

schema_config:
  configs:
    - from: 2024-01-01
      store: ${LOKI_STORE:-tsdb}
      object_store: ${LOKI_OBJECT_STORE:-filesystem}
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /var/loki/index
    cache_location: /var/loki/cache
    cache_ttl: 168h
    shared_store: filesystem
  filesystem:
    directory: /var/loki/chunks

compactor:
  working_directory: /var/loki/compactor
  shared_store: filesystem
  compaction_interval: 30m
  retention_enabled: true
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  max_global_streams_per_user: 5000
  max_query_length: 720h
  max_query_series: 500
  max_concurrent_tail_requests: 10
  max_line_size: 256KB
  max_line_size_truncate: true
  retention_period: ${LOKI_RETENTION_PERIOD:-720h}

  # Per-tenant rate limiting
  per_tenant_override_config: ""

chunk_store_config:
  max_look_back_period: ${LOKI_RETENTION_PERIOD:-720h}

table_manager:
  retention_deletes_enabled: true
  retention_period: ${LOKI_RETENTION_PERIOD:-720h}

# ---------------------------------------------------------------------------
# Scrape configurations for log collection via Promtail
# ---------------------------------------------------------------------------
# Promtail is the agent that ships logs to Loki. This section defines the
# scrape configs that Promtail should use.
#
# Promtail should be deployed on each node with the following command:
#   docker run --name promtail --restart unless-stopped \
#     -v /var/log:/var/log:ro \
#     -v /var/lib/docker/containers:/var/lib/docker/containers:ro \
#     -v ./loki-config.yml:/etc/loki/config.yml:ro \
#     grafana/promtail:latest \
#     -config.file=/etc/loki/config.yml

scrape_configs:
  # Docker container logs (all nodes)
  - job_name: docker
    docker_sd_configs:
      - host: "unix:///var/run/docker.sock"
        refresh_interval: 15s
        filters:
          - name: "label"
            values: ["logs.enabled=true"]
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_label_compose_project"]
        regex: "(.+)"
        target_label: "project"
      - source_labels: ["__meta_docker_container_label_compose_service"]
        regex: "(.+)"
        target_label: "service"
      - source_labels: ["__path__"]
        target_label: "__path__"
    pipeline_stages:
      - regex:
          expression: "^(?P<level>DEBUG|INFO|WARNING|ERROR|CRITICAL|TRACE)\\b"
      - labels:
          level:

  # System journal logs
  - job_name: journal
    journal:
      path: /var/log/journal
      max_age: 12h
      labels:
        job: systemd-journal
    relabel_configs:
      - source_labels: ["__journal__systemd_unit"]
        target_label: "unit"
      - source_labels: ["__journal__hostname"]
        target_label: "hostname"
      - source_labels: ["__journal_priority_keyword"]
        target_label: "level"
    pipeline_stages:
      - drop:
          source: "level"
          expression: "info|debug"
          drop_counter_reason: "noisy_info_logs"

  # Application log files (PM2 logs, nginx logs, etc.)
  - job_name: pm2_logs
    static_configs:
      - targets: [localhost]
        labels:
          job: pm2
          __path__: /var/log/pm2/*.log
    pipeline_stages:
      - regex:
          expression: "^(?P<level>DEBUG|INFO|WARNING|ERROR|FATAL)\\b"
      - labels:
          level:

  - job_name: nginx_logs
    static_configs:
      - targets: [localhost]
        labels:
          job: nginx
          __path__: /var/log/nginx/*.log
    pipeline_stages:
      - regex:
          expression: "\\s(?P<status>\\d{3})\\s"
      - labels:
          status:
      - metrics:
          nginx_http_status:
            type: Counter
            description: "Nginx HTTP status codes"
            prefix: "loki_nginx_"
            max_idle_dur: 24h
            config:
              action: inc
              match_all: true
              count_entry: true

  - job_name: repo_router
    static_configs:
      - targets: [localhost]
        labels:
          job: repo-router
          __path__: /var/log/repo-router/*.log
    pipeline_stages:
      - regex:
          expression: "\\[(?P<level>INFO|WARN|ERROR|DEBUG|FATAL)\\]"
      - labels:
          level:

# ---------------------------------------------------------------------------
# Ruler for log-based alerting
# ---------------------------------------------------------------------------
ruler:
  storage:
    type: local
    local:
      directory: /var/loki/rules
  rule_path: /var/loki/rules-tmp
  alertmanager_url: http://${ALERTMANAGER_HOST:-127.0.0.1}:${ALERTMANAGER_PORT:-9093}
  ring:
    kvstore:
      store: inmemory
  enable_api: true
