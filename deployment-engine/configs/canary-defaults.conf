#!/usr/bin/env bash
# =============================================================================
# Canary Deployment Defaults — Wheeler Deployment Engine
# =============================================================================
# Source this file to load canary deployment configuration defaults.
# All values can be overridden by environment variables.
#
# Usage: source /root/deployment-engine/configs/canary-defaults.conf
# =============================================================================

# ─── Timing ─────────────────────────────────────────────────────────────────

# Seconds to wait after canary start before beginning health checks
CANARY_WARMUP_SECONDS="${CANARY_WARMUP_SECONDS:-30}"

# Number of consecutive health checks the canary must pass before promotion
CANARY_HEALTH_RETRIES="${CANARY_HEALTH_RETRIES:-5}"

# Seconds between consecutive health check attempts
CANARY_HEALTH_INTERVAL="${CANARY_HEALTH_INTERVAL:-10}"

# ─── Thresholds ─────────────────────────────────────────────────────────────

# Minimum health score (0.0 – 1.0) required to promote canary
# Health score is computed as an average across all health checks:
#   - HTTP status match: 1.0 if canary 200 OK, 0.0 otherwise
#   - Response time ratio: 1.0 if canary <= 1.2× stable, scales down
#   - Error rate: 1.0 if canary <= stable, 0.0 if higher
#   - Memory usage: 1.0 if canary <= 1.3× stable, scales down
CANARY_PROMOTE_THRESHOLD="${CANARY_PROMOTE_THRESHOLD:-0.95}"

# Maximum ratio of canary response time vs stable (e.g., 1.20 = 20% slower max)
CANARY_RESPONSE_TIME_MAX_RATIO="${CANARY_RESPONSE_TIME_MAX_RATIO:-1.20}"

# Maximum ratio of canary memory vs stable (e.g., 1.30 = 30% more memory max)
CANARY_MEMORY_MAX_RATIO="${CANARY_MEMORY_MAX_RATIO:-1.30}"

# HTTP status code that the health endpoint must return
CANARY_EXPECTED_STATUS="${CANARY_EXPECTED_STATUS:-200}"

# ─── Behavior ───────────────────────────────────────────────────────────────

# Automatically rollback on canary failure (true/false)
CANARY_AUTO_ROLLBACK="${CANARY_AUTO_ROLLBACK:-true}"

# Automatically promote on canary success (true/false)
# When false, requires manual confirmation after successful canary health checks
CANARY_AUTO_PROMOTE="${CANARY_AUTO_PROMOTE:-false}"

# Maximum number of canary redeploy attempts on failure before giving up
CANARY_MAX_REDEPLOY_ATTEMPTS="${CANARY_MAX_REDEPLOY_ATTEMPTS:-1}"

# ─── Paths ──────────────────────────────────────────────────────────────────

# Directory for canary deployment logs
CANARY_LOG_DIR="${CANARY_LOG_DIR:-/root/deployment-engine/logs}"

# Directory for canary state files (lock files, health snapshots)
CANARY_STATE_DIR="${CANARY_STATE_DIR:-/root/deployment-engine/state/canary}"

# ─── Traffic Control (future Nginx/Traefik integration) ─────────────────────

# Port offset for canary instance (added to stable process port)
# e.g., if stable runs on port 4000, canary will bind to 4100
CANARY_PORT_OFFSET="${CANARY_PORT_OFFSET:-100}"

# Whether to use traffic splitting (requires Nginx/Traefik config)
# When false, health checks are done directly against the canary port
CANARY_TRAFFIC_SPLIT_ENABLED="${CANARY_TRAFFIC_SPLIT_ENABLED:-false}"

# ─── Health Check Endpoints ─────────────────────────────────────────────────

# Default health endpoint path (overridden per-service in service catalog)
CANARY_HEALTH_ENDPOINT="${CANARY_HEALTH_ENDPOINT:-/health}"

# Connection timeout for health check curl calls
CANARY_CURL_CONNECT_TIMEOUT="${CANARY_CURL_CONNECT_TIMEOUT:-5}"

# Max time for a single health check curl call
CANARY_CURL_MAX_TIME="${CANARY_CURL_MAX_TIME:-10}"

# ─── Notification ───────────────────────────────────────────────────────────

# Slack/Discord webhook for canary deployment notifications
CANARY_WEBHOOK_URL="${CANARY_WEBHOOK_URL:-}"

# ─── Canary naming ──────────────────────────────────────────────────────────

# Suffix appended to the PM2 process name for the canary instance
CANARY_NAME_SUFFIX="${CANARY_NAME_SUFFIX:--canary}"
